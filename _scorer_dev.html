<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score Any Stock — Market Prism Dev</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
<style>
/* ── Reset & Vars ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --mp-obsidian:    #080B11;
  --mp-surface:     #0C1018;
  --mp-surface2:    #111927;
  --mp-border:      rgba(255,255,255,0.06);
  --mp-border-hover:rgba(255,255,255,0.14);
  --mp-text-primary:#FFFFFF;
  --mp-text-secondary:rgba(255,255,255,0.7);
  --mp-text-tertiary:#A0A8B0;
  --mp-text-muted:  rgba(255,255,255,0.3);
  --mp-cyan:        #00AEFF;
  --mp-teal:        #38C8B8;
  --mp-green:       #00DE94;
  --mp-red:         #FF4D4D;
  --mp-amber:       #FFB800;
  --mp-violet:      #7B61FF;
  --font-display:   'Instrument Serif', 'DM Serif Display', Georgia, serif;
  --font-body:      'Inter', 'DM Sans', system-ui, sans-serif;
}

body {
  background: var(--mp-obsidian);
  color: var(--mp-text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none; z-index: 0;
}

/* ── Layout ── */
.page-wrap {
  position: relative; z-index: 1;
  max-width: 940px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}

/* ── Header ── */
.page-header { text-align: center; margin-bottom: 40px; }
.page-header h1 {
  font-family: var(--font-display); font-weight: 400;
  font-size: clamp(28px, 3.2vw, 42px); letter-spacing: -0.025em; margin-bottom: 4px;
}
.page-header h1 em { color: #4DC8F0; font-style: italic; }
.page-header .subtitle { color: var(--mp-text-tertiary); font-size: 14px; }

/* ── Health ── */
.health-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--mp-text-tertiary); margin-top: 8px; }
.health-dot .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mp-text-muted); transition: background 0.3s; }
.health-dot .dot.ok { background: var(--mp-green); box-shadow: 0 0 6px rgba(0,222,148,0.5); }
.health-dot .dot.err { background: var(--mp-red); box-shadow: 0 0 6px rgba(255,77,77,0.5); }

/* ── Mode Toggle ── */
.mode-toggle { display: flex; justify-content: center; gap: 0; margin-bottom: 24px; }
.mode-btn {
  background: var(--mp-surface); border: 1px solid var(--mp-border);
  color: var(--mp-text-tertiary); font-family: var(--font-body);
  font-size: 13px; font-weight: 500; padding: 8px 24px; cursor: pointer; transition: all 0.2s;
}
.mode-btn:first-child { border-radius: 8px 0 0 8px; }
.mode-btn:last-child  { border-radius: 0 8px 8px 0; border-left: none; }
.mode-btn.active { background: rgba(0,174,255,0.12); border-color: var(--mp-cyan); color: var(--mp-cyan); }

/* ── Search ── */
.search-section { margin-bottom: 32px; }
.search-row { display: flex; gap: 12px; max-width: 560px; margin: 0 auto; }
.search-input {
  flex: 1; background: var(--mp-surface); border: 1px solid var(--mp-border); border-radius: 12px;
  color: var(--mp-text-primary); font-family: var(--font-body); font-size: 16px; padding: 12px 16px;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: var(--mp-cyan); box-shadow: 0 0 0 3px rgba(0,174,255,0.15); }
.search-input::placeholder { color: var(--mp-text-muted); }
.score-btn {
  background: linear-gradient(135deg, #00AEFF, #0090DD); border: none; border-radius: 12px;
  color: #fff; font-family: var(--font-body); font-size: 14px; font-weight: 600;
  padding: 12px 28px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; white-space: nowrap;
}
.score-btn:hover { opacity: 0.9; }
.score-btn:active { transform: scale(0.97); }
.score-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Batch ── */
.batch-section { display: none; margin-bottom: 32px; }
.batch-section.visible { display: block; }
.batch-textarea {
  width: 100%; max-width: 560px; margin: 0 auto; display: block;
  background: var(--mp-surface); border: 1px solid var(--mp-border); border-radius: 12px;
  color: var(--mp-text-primary); font-family: var(--font-body); font-size: 14px; padding: 12px 16px;
  outline: none; resize: vertical; min-height: 60px; transition: border-color 0.2s;
}
.batch-textarea:focus { border-color: var(--mp-cyan); box-shadow: 0 0 0 3px rgba(0,174,255,0.15); }
.batch-textarea::placeholder { color: var(--mp-text-muted); }
.batch-hint { text-align: center; color: var(--mp-text-muted); font-size: 12px; margin-top: 8px; }
.batch-actions { text-align: center; margin-top: 12px; }

/* ── Loading ── */
.loading-wrap { display: none; text-align: center; padding: 48px 0; }
.loading-wrap.visible { display: block; }
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid var(--mp-border);
  border-top-color: var(--mp-cyan); border-radius: 50%;
  margin: 0 auto 16px; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--mp-text-secondary); font-size: 14px; }
.loading-text strong { color: var(--mp-cyan); }

/* ── Error ── */
.error-msg {
  display: none; text-align: center; padding: 24px;
  background: rgba(255,77,77,0.08); border: 1px solid rgba(255,77,77,0.2);
  border-radius: 12px; color: var(--mp-red); font-size: 14px; margin-bottom: 24px;
}
.error-msg.visible { display: block; }

/* ── Result ── */
.result-section { display: none; }
.result-section.visible { display: block; animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

/* ── Score Card ── */
.score-card {
  background: var(--mp-surface); border: 1px solid var(--mp-border); border-radius: 16px;
  padding: 0; margin-bottom: 20px; position: relative; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.score-card:hover { border-color: var(--mp-border-hover); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
.score-card .accent-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; }

/* ── Hero Header ── */
.sc-hero {
  padding: 28px 28px 20px;
  display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px;
}
.sc-hero-left h2 {
  font-family: var(--font-display); font-weight: 400; font-size: 32px;
  letter-spacing: -0.025em; margin-bottom: 2px;
}
.sc-hero-left .meta { color: var(--mp-text-tertiary); font-size: 13px; }
.sc-hero-right { text-align: right; }
.sc-verdict-badge {
  display: inline-block; font-size: 14px; font-weight: 600;
  padding: 6px 16px; border-radius: 8px; margin-bottom: 6px;
}
.sc-direction {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 12px; border-radius: 4px; display: inline-block;
}

/* ── Narrative Ring + Summary ── */
.sc-narrative {
  display: flex; gap: 24px; align-items: flex-start;
  padding: 0 28px 24px; flex-wrap: wrap;
}
.sc-ring-wrap { flex-shrink: 0; position: relative; width: 110px; height: 110px; }
.sc-ring-wrap svg { width: 110px; height: 110px; }
.sc-ring-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
}
.sc-ring-val { font-size: 28px; font-weight: 700; line-height: 1; }
.sc-ring-lbl { font-size: 10px; color: var(--mp-text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
.sc-narrative-body { flex: 1; min-width: 200px; }
.sc-narrative-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.sc-nbadge {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.sc-narrative-text {
  font-size: 14px; color: var(--mp-text-secondary); line-height: 1.65;
}

/* ── Mini Rings Row ── */
.sc-mini-rings {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--mp-border); border-top: 1px solid var(--mp-border);
  border-bottom: 1px solid var(--mp-border);
}
.sc-mini-cell {
  background: var(--mp-surface); padding: 18px; text-align: center;
}
.sc-mini-cell svg { width: 60px; height: 60px; margin-bottom: 6px; }
.sc-mini-val { font-size: 14px; font-weight: 600; }
.sc-mini-lbl { font-size: 11px; color: var(--mp-text-muted); margin-top: 2px; }
.sc-mini-sub { font-size: 11px; color: var(--mp-text-tertiary); margin-top: 4px; }

/* ── Diagnosis Strip ── */
.diag-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--mp-border);
}
.diag-cell { background: var(--mp-surface); padding: 16px 18px; }
.diag-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); margin-bottom: 6px;
}
.diag-val { font-size: 20px; font-weight: 400; line-height: 1.1; margin-bottom: 3px; }
.diag-sub { font-size: 11px; color: var(--mp-text-tertiary); }

/* ── Warranted vs Hype ── */
.wh-section { padding: 24px 28px; }
.wh-title {
  font-family: var(--font-display); font-weight: 400; font-size: 18px;
  margin-bottom: 14px;
}
.wh-labels { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
.wh-bar-track {
  height: 10px; background: rgba(255,255,255,0.06); border-radius: 5px;
  overflow: hidden; position: relative; margin-bottom: 16px;
}
.wh-bar-fill {
  height: 100%; border-radius: 5px;
  background: linear-gradient(90deg, var(--mp-green), var(--mp-cyan), var(--mp-amber), var(--mp-red));
  position: absolute; top: 0; left: 0;
}
.wh-marker {
  position: absolute; top: -3px; width: 4px; height: 16px;
  background: #fff; border-radius: 2px; box-shadow: 0 0 8px rgba(255,255,255,0.4);
  transform: translateX(-50%);
}
.wh-stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.wh-stat { text-align: center; }
.wh-stat-val { font-size: 18px; font-weight: 600; }
.wh-stat-lbl { font-size: 11px; color: var(--mp-text-muted); margin-top: 2px; }

/* ── Meta Footer ── */
.sc-footer {
  display: flex; flex-wrap: wrap; gap: 16px; font-size: 12px;
  color: var(--mp-text-muted); padding: 14px 28px;
  border-top: 1px solid var(--mp-border);
}

/* ── Batch Table ── */
.batch-results { display: none; }
.batch-results.visible { display: block; animation: fadeInUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
.batch-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--mp-border); }
.batch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.batch-table th {
  background: var(--mp-surface2); color: var(--mp-text-tertiary);
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--mp-border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
.batch-table th:hover { color: var(--mp-text-primary); }
.batch-table th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.4; }
.batch-table th.sorted .sort-arrow { opacity: 1; color: var(--mp-cyan); }
.batch-table td { padding: 10px 12px; border-bottom: 1px solid var(--mp-border); white-space: nowrap; }
.batch-table tr { background: var(--mp-surface); transition: background 0.15s; cursor: pointer; }
.batch-table tr:hover { background: var(--mp-surface2); }
.batch-table .ticker-col { font-weight: 600; font-size: 14px; }
.batch-expanded { display: none; }
.batch-expanded.visible { display: table-row; }
.batch-expanded td { padding: 20px; background: var(--mp-surface2); }

/* ── Price Strip ── */
.price-strip {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--mp-border);
  border-top: 1px solid var(--mp-border); border-bottom: 1px solid var(--mp-border);
}
.price-strip .diag-cell { background: var(--mp-surface); padding: 16px 18px; }

/* ── SEC Financials ── */
.sec-section { padding: 24px 28px; border-top: 1px solid var(--mp-border); }
.sec-section h3 {
  font-family: var(--font-display); font-weight: 400; font-size: 18px; margin-bottom: 14px;
}
.sec-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
}
.sec-cell {
  background: rgba(255,255,255,0.02); border: 1px solid var(--mp-border);
  border-radius: 10px; padding: 12px; text-align: center;
}
.sec-cell label { display: block; font-size: 10px; color: var(--mp-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.sec-cell .val { font-size: 18px; font-weight: 600; }

/* ── Sentiment & Headlines ── */
.sentiment-section { padding: 24px 28px; border-top: 1px solid var(--mp-border); }
.sentiment-section h3 {
  font-family: var(--font-display); font-weight: 400; font-size: 18px; margin-bottom: 14px;
}
.sentiment-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap;
}
.sentiment-ring-wrap { flex-shrink: 0; position: relative; width: 64px; height: 64px; }
.sentiment-ring-wrap svg { width: 64px; height: 64px; }
.sentiment-ring-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.sentiment-ring-val { font-size: 18px; font-weight: 700; line-height: 1; }
.sentiment-stats { display: flex; gap: 20px; }
.sentiment-stats .ss-item { font-size: 13px; color: var(--mp-text-tertiary); }
.sentiment-stats .ss-item strong { color: var(--mp-text-primary); }

.headlines-list { list-style: none; }
.headlines-list li {
  padding: 10px 0; border-bottom: 1px solid var(--mp-border);
  font-size: 13px; color: var(--mp-text-secondary); line-height: 1.5;
}
.headlines-list li:last-child { border-bottom: none; }
.headline-source {
  font-size: 11px; color: var(--mp-text-muted); margin-top: 2px;
}

/* ── Claim Quality ── */
.claim-section { padding: 24px 28px; border-top: 1px solid var(--mp-border); }
.claim-section h3 {
  font-family: var(--font-display); font-weight: 400; font-size: 18px; margin-bottom: 14px;
}
.claim-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.claim-pill {
  font-size: 12px; padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--mp-border);
}
.claim-pill.good { color: var(--mp-green); border-color: rgba(0,222,148,0.2); background: rgba(0,222,148,0.06); }
.claim-pill.bad { color: var(--mp-red); border-color: rgba(255,77,77,0.2); background: rgba(255,77,77,0.06); }
.claim-pill.neutral { color: var(--mp-text-tertiary); }

/* ── Export Dropdown ── */
.export-wrap { position: relative; display: inline-block; }
.export-btn {
  background: transparent; border: 1px solid var(--mp-border); border-radius: 6px;
  color: var(--mp-text-tertiary); font-family: var(--font-body); font-size: 11px;
  padding: 3px 10px; cursor: pointer; transition: all 0.2s;
}
.export-btn:hover { border-color: var(--mp-cyan); color: var(--mp-cyan); }
.export-menu {
  display: none; position: absolute; bottom: 100%; left: 0; margin-bottom: 6px;
  background: var(--mp-surface2); border: 1px solid var(--mp-border-hover);
  border-radius: 8px; overflow: hidden; min-width: 140px; z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.export-menu.open { display: block; }
.export-menu button {
  display: block; width: 100%; background: none; border: none;
  color: var(--mp-text-secondary); font-family: var(--font-body); font-size: 13px;
  padding: 10px 14px; text-align: left; cursor: pointer; transition: background 0.15s;
}
.export-menu button:hover { background: rgba(0,174,255,0.1); color: var(--mp-cyan); }
.export-menu button + button { border-top: 1px solid var(--mp-border); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .page-wrap { padding: 20px 16px 48px; }
  .sc-narrative { flex-direction: column; align-items: center; }
  .sc-mini-rings { grid-template-columns: 1fr 1fr 1fr; }
  .diag-strip { grid-template-columns: repeat(2, 1fr); }
  .price-strip { grid-template-columns: repeat(2, 1fr); }
  .wh-stats { grid-template-columns: repeat(2, 1fr); }
  .sec-grid { grid-template-columns: repeat(2, 1fr); }
  .sc-hero { flex-direction: column; }
  .sc-hero-right { text-align: left; }
  .search-row { flex-direction: column; }
  .score-btn { width: 100%; }
}
@media (max-width: 480px) {
  .sc-mini-rings { grid-template-columns: 1fr; }
  .diag-strip { grid-template-columns: 1fr 1fr; }
  .price-strip { grid-template-columns: 1fr 1fr; }
  .wh-stats { grid-template-columns: 1fr 1fr; }
  .sec-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="page-wrap">
  <header class="page-header">
    <h1>Score <em>Any Stock</em></h1>
    <p class="subtitle">On-demand narrative scoring — dev testing tool</p>
    <div class="health-dot" id="health">
      <span class="dot" id="health-dot"></span>
      <span id="health-label">Checking API...</span>
    </div>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('single')" id="mode-single">Single</button>
    <button class="mode-btn" onclick="setMode('batch')" id="mode-batch">Batch</button>
  </div>

  <div class="search-section" id="single-section">
    <div class="search-row">
      <input class="search-input" id="ticker-input" type="text" placeholder="Enter ticker (e.g. AAPL)" autocomplete="off" spellcheck="false">
      <button class="score-btn" id="score-btn" onclick="scoreSingle()">Score</button>
    </div>
  </div>

  <div class="batch-section" id="batch-section">
    <textarea class="batch-textarea" id="batch-input" placeholder="AAPL, TSLA, MSFT, NVDA, GOOG" rows="2"></textarea>
    <p class="batch-hint">Comma-separated tickers (max 20)</p>
    <div class="batch-actions">
      <button class="score-btn" id="batch-btn" onclick="scoreBatch()">Score All</button>
    </div>
  </div>

  <div class="loading-wrap" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loading-text">Scoring <strong>...</strong> (~5 seconds)</p>
  </div>

  <div class="error-msg" id="error"></div>
  <div class="result-section" id="result"></div>
  <div class="batch-results" id="batch-results"></div>
</div>

<script>
/* ── Environment ── */
window.__env = { SUPABASE_URL: '', SUPABASE_ANON: '' };

const EDGE_FN_URL = 'https://kugfvlagaetiqtdwdfmk.supabase.co/functions/v1/score-stock';

async function callEdgeFn(body) {
  const anonKey = window.__env.SUPABASE_ANON;
  const res = await fetch(EDGE_FN_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + anonKey, 'apikey': anonKey },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const text = await res.text().catch(() => res.statusText);
    throw new Error('Edge Function error (' + res.status + '): ' + text);
  }
  return res.json();
}

/* ── Client-Side Cache (5-min TTL) ── */
const CACHE_TTL = 5 * 60 * 1000;
const CACHE_PREFIX = 'ms_score_';

function getCachedScore(ticker) {
  try {
    const raw = localStorage.getItem(CACHE_PREFIX + ticker.toUpperCase());
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) { localStorage.removeItem(CACHE_PREFIX + ticker.toUpperCase()); return null; }
    return data;
  } catch (e) { return null; }
}

function setCachedScore(ticker, data) {
  try { localStorage.setItem(CACHE_PREFIX + ticker.toUpperCase(), JSON.stringify({ data, ts: Date.now() })); }
  catch (e) { /* quota exceeded */ }
}

/* ── Verdict Color Map ── */
const VERDICT_MAP = {
  'Structurally Supported':       { color: '#00DE94', bg: 'rgba(0,222,148,0.12)', dir: 'LONG' },
  'Accumulate':                   { color: '#7BE89A', bg: 'rgba(123,232,154,0.12)', dir: 'LONG' },
  'Low Risk':                     { color: '#7BE89A', bg: 'rgba(123,232,154,0.12)', dir: 'LONG' },
  'High Conviction Continuation': { color: '#00DE94', bg: 'rgba(0,222,148,0.12)', dir: 'LONG' },

  'Exhausted Narrative':          { color: '#FF8C00', bg: 'rgba(255,140,0,0.12)', dir: 'HOLD' },

};

const DIR_COLORS = {
  'LONG':  { color: '#00DE94', bg: 'rgba(0,222,148,0.15)' },
  'SHORT': { color: '#FF4D4D', bg: 'rgba(255,77,77,0.15)' },
  'HOLD':  { color: '#A0A8B0', bg: 'rgba(160,168,176,0.15)' },
};

let currentMode = 'single';
let batchData = [];
let sortCol = null;
let sortAsc = true;

/* ── Color Helpers ── */
function scoreColor(v, inv) {
  if (inv) { return v <= 30 ? '#00DE94' : v <= 60 ? '#D9A200' : '#FF4D4D'; }
  return v >= 70 ? '#5b8ec9' : v >= 40 ? '#D9A200' : '#D94444';
}

function formatMcap(n) {
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(1) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(0) + 'M';
  return '$' + n.toLocaleString();
}
function formatRevenue(n) {
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(0) + 'M';
  if (n >= 1e3)  return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + n.toFixed(0);
}
function formatVolume(n) {
  if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3)  return (n / 1e3).toFixed(0) + 'K';
  return n.toString();
}

/* ── Ring SVG Builder ── */
function buildRingSVG(val, maxVal, color, size) {
  const r = (size / 2) - 6;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(val / maxVal, 1);
  const offset = circ * (1 - pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"
      style="transition: stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)"/>
  </svg>`;
}

/* ── Health Check ── */
async function checkHealth() {
  const dot = document.getElementById('health-dot');
  const label = document.getElementById('health-label');
  if (!window.__env.SUPABASE_ANON) { dot.className = 'dot err'; label.textContent = 'Anon key not configured'; return; }
  try {
    await callEdgeFn({ ticker: 'HEALTH_CHECK' });
    dot.className = 'dot ok'; label.textContent = 'Edge Function connected';
  } catch (e) {
    if (e.message && e.message.includes('Edge Function error')) {
      dot.className = 'dot ok'; label.textContent = 'Edge Function connected';
    } else { dot.className = 'dot err'; label.textContent = 'Edge Function unreachable'; }
  }
}

/* ── UI Helpers ── */
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-single').classList.toggle('active', mode === 'single');
  document.getElementById('mode-batch').classList.toggle('active', mode === 'batch');
  document.getElementById('single-section').style.display = mode === 'single' ? 'block' : 'none';
  document.getElementById('batch-section').classList.toggle('visible', mode === 'batch');
  hideAll();
}
function hideAll() {
  ['loading','error','result','batch-results'].forEach(id => document.getElementById(id).classList.remove('visible'));
}
function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.classList.add('visible'); }
function showLoading(text) { hideAll(); document.getElementById('loading-text').innerHTML = text; document.getElementById('loading').classList.add('visible'); }

/* ── Single Score ── */
let lastFromCache = false;

async function scoreSingle() {
  const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
  if (!ticker) return;

  // Check cache first
  const cached = getCachedScore(ticker);
  if (cached) {
    hideAll();
    lastFromCache = true;
    document.getElementById('result').innerHTML = buildScoreCard(cached);
    document.getElementById('result').classList.add('visible');
    return;
  }

  lastFromCache = false;
  showLoading('Analyzing <strong>' + ticker + '</strong>... (~5 seconds)');
  document.getElementById('score-btn').disabled = true;
  try {
    const data = await callEdgeFn({ ticker });
    if (data.current_price === 0) { hideAll(); showError('Ticker "' + ticker + '" was not found or has no price data.'); return; }
    setCachedScore(ticker, data);
    hideAll();
    document.getElementById('result').innerHTML = buildScoreCard(data);
    document.getElementById('result').classList.add('visible');
  } catch (e) { hideAll(); showError('Failed to score ' + ticker + ': ' + (e.message || e)); }
  finally { document.getElementById('score-btn').disabled = false; }
}

/* ── Batch Score ── */
async function scoreBatch() {
  const raw = document.getElementById('batch-input').value.trim().toUpperCase();
  if (!raw) return;
  const tickers = raw.split(/[,\s\n]+/).filter(Boolean).slice(0, 20);
  if (!tickers.length) return;

  // Split into cached vs uncached
  const cachedResults = [];
  const uncachedTickers = [];
  tickers.forEach(t => {
    const c = getCachedScore(t);
    if (c) cachedResults.push(c);
    else uncachedTickers.push(t);
  });

  // All cached — render immediately
  if (!uncachedTickers.length) {
    lastFromCache = true;
    batchData = cachedResults;
    hideAll(); renderBatchTable();
    document.getElementById('batch-results').classList.add('visible');
    return;
  }

  lastFromCache = false;
  showLoading('Analyzing <strong>' + uncachedTickers.length + ' tickers</strong>' + (cachedResults.length ? ' (' + cachedResults.length + ' cached)' : '') + '... (~' + Math.max(5, uncachedTickers.length * 2) + ' seconds)');
  document.getElementById('batch-btn').disabled = true;
  try {
    const data = await callEdgeFn({ tickers: uncachedTickers });
    const freshResults = Array.isArray(data) ? data : (data.results || []);
    freshResults.forEach(r => { if (r && r.ticker) setCachedScore(r.ticker, r); });
    batchData = cachedResults.concat(freshResults);
    hideAll(); renderBatchTable();
    document.getElementById('batch-results').classList.add('visible');
  } catch (e) { hideAll(); showError('Batch scoring failed: ' + (e.message || e)); }
  finally { document.getElementById('batch-btn').disabled = false; }
}

/* ── Build Score Card ── */
function buildScoreCard(d) {
  const vm = VERDICT_MAP[d.verdict] || { color: '#A0A8B0', bg: 'rgba(160,168,176,0.12)', dir: 'HOLD' };
  const dir = d.trade_direction || vm.dir || 'HOLD';
  const dc = DIR_COLORS[dir] || DIR_COLORS.HOLD;

  // Compute composite strength (like ticker page)
  const evidence = d.vms || 0;
  const confidence = d.ccp || 0;
  const risk = d.nrs || 0;
  const overall = Math.round((evidence * 0.35) + (confidence * 0.35) + ((100 - risk) * 0.30));
  const overallColor = scoreColor(overall, false);

  // Warranted vs Hype
  const tractability = Math.round(100 - (d.drift_score || 0));
  const warranted = Math.round((evidence * 0.45) + (tractability * 0.25) + (Math.max(0, 100 - Math.abs(d.fair_value_deviation_pct || 0)) * 0.20) + ((100 - (d.coordination_score || 0)) * 0.10));
  const hype = 100 - warranted;

  // Price data
  const fvd = d.fair_value_deviation_pct;
  const fvdColor = fvd == null ? 'var(--mp-text-muted)' : (fvd > 0 ? '#FF4D4D' : '#00DE94');
  const fvdLabel = fvd == null ? '—' : ((fvd > 0 ? '+' : '') + fvd.toFixed(1) + '%');
  const fvdStatus = fvd == null ? 'N/A' : (Math.abs(fvd) < 5 ? 'Fair' : fvd > 0 ? 'Overvalued' : 'Undervalued');
  const fv = d.fair_value != null ? '$' + d.fair_value.toFixed(2) : '—';
  const cp = '$' + d.current_price.toFixed(2);

  // Phase from HDS + NRS
  const phase = d.hds >= 0.8 ? (risk <= 30 ? 'Emerging' : 'Mature') : (risk >= 60 ? 'Exhausting' : 'Fading');
  const phaseColor = phase === 'Emerging' ? '#00DE94' : phase === 'Mature' ? '#5b8ec9' : phase === 'Fading' ? '#D9A200' : '#FF4D4D';

  // Narrative summary auto-gen if missing
  let summary = d.narrative_summary || '';
  if (!summary) {
    if (overall >= 70) summary = 'This narrative has strong momentum and credible evidence backing. The story is well-supported by fundamentals.';
    else if (overall >= 45) summary = 'Narrative shows moderate strength — evidence is mixed and the story may be shifting. Watch for directional changes.';
    else summary = 'Weak narrative signal. The story may be losing relevance or is not well-supported by the underlying data.';
    if (risk >= 65) summary += ' Elevated narrative risk detected — the gap between media coverage and SEC filings is widening.';
  }

  const mcapStr = d.market_cap ? formatMcap(d.market_cap) : '—';
  const shortName = d.short_name || d.ticker;
  const sectorLabel = [d.sector, d.industry].filter(Boolean).join(' · ') || 'Unknown Sector';

  // Price change from 30d
  const pChange30d = d.price_30d_before ? (((d.current_price - d.price_30d_before) / d.price_30d_before) * 100) : null;
  const pChange30dStr = pChange30d != null ? ((pChange30d > 0 ? '+' : '') + pChange30d.toFixed(1) + '%') : null;
  const pChange30dColor = pChange30d == null ? '' : (pChange30d >= 0 ? '#00DE94' : '#FF4D4D');

  return `
    <div class="score-card">
      <div class="accent-bar" style="background:${vm.color}"></div>

      <!-- Hero Header -->
      <div class="sc-hero">
        <div class="sc-hero-left">
          <h2>${d.ticker}${shortName !== d.ticker ? ' <span style="font-size:18px;color:var(--mp-text-tertiary);font-family:var(--font-body);font-weight:400">' + shortName + '</span>' : ''}</h2>
          <div class="meta">${sectorLabel} · ${cp}${pChange30dStr ? ' <span style="color:' + pChange30dColor + '">' + pChange30dStr + ' (30d)</span>' : ''}${d.market_cap ? ' · ' + mcapStr : ''}</div>
        </div>
        <div class="sc-hero-right">
          <div class="sc-verdict-badge" style="color:${vm.color};background:${vm.bg}">${d.verdict}</div><br>
          <span class="sc-direction" style="color:${dc.color};background:${dc.bg}">${dir}</span>
        </div>
      </div>

      <!-- Narrative Ring + Summary -->
      <div class="sc-narrative">
        <div class="sc-ring-wrap">
          ${buildRingSVG(overall, 100, overallColor, 110)}
          <div class="sc-ring-center">
            <div class="sc-ring-val" style="color:${overallColor}">${overall}</div>
            <div class="sc-ring-lbl">Strength</div>
          </div>
        </div>
        <div class="sc-narrative-body">
          <div class="sc-narrative-badges">
            <span class="sc-nbadge" style="color:${phaseColor};background:${phaseColor}22">${phase}</span>
            <span class="sc-nbadge" style="color:${vm.color};background:${vm.bg}">${d.verdict}</span>
            ${d.macro_theme ? `<span class="sc-nbadge" style="color:var(--mp-cyan);background:rgba(0,174,255,0.12)">${d.macro_theme}</span>` : ''}
          </div>
          <p class="sc-narrative-text">${summary}</p>
        </div>
      </div>

      <!-- Mini Rings: Evidence / Credibility / Pressure -->
      <div class="sc-mini-rings">
        <div class="sc-mini-cell">
          ${buildRingSVG(evidence, 100, scoreColor(evidence, false), 60)}
          <div class="sc-mini-val" style="color:${scoreColor(evidence, false)}">${evidence}</div>
          <div class="sc-mini-lbl">Evidence</div>
          <div class="sc-mini-sub">Verification quality</div>
        </div>
        <div class="sc-mini-cell">
          ${buildRingSVG(confidence, 100, scoreColor(confidence, false), 60)}
          <div class="sc-mini-val" style="color:${scoreColor(confidence, false)}">${confidence}</div>
          <div class="sc-mini-lbl">Credibility</div>
          <div class="sc-mini-sub">Composite confidence</div>
        </div>
        <div class="sc-mini-cell">
          ${buildRingSVG(risk, 100, scoreColor(risk, true), 60)}
          <div class="sc-mini-val" style="color:${scoreColor(risk, true)}">${risk}</div>
          <div class="sc-mini-lbl">Risk</div>
          <div class="sc-mini-sub">Narrative risk score</div>
        </div>
      </div>

      <!-- Diagnosis Strip -->
      <div class="diag-strip">
        <div class="diag-cell">
          <div class="diag-label">Phase</div>
          <div class="diag-val" style="color:${phaseColor}">${phase}</div>
          <div class="diag-sub">Lifecycle stage</div>
        </div>
        <div class="diag-cell">
          <div class="diag-label">Drift</div>
          <div class="diag-val">${d.drift_score}<span style="font-size:12px;color:var(--mp-text-muted)">/100</span></div>
          <div class="diag-sub">SEC filing divergence</div>
        </div>
        <div class="diag-cell">
          <div class="diag-label">Coordination</div>
          <div class="diag-val">${d.coordination_score}<span style="font-size:12px;color:var(--mp-text-muted)">/100</span></div>
          <div class="diag-sub">${d.coordination_score > 50 ? 'Elevated clustering' : 'Independent sources'}</div>
        </div>
        <div class="diag-cell">
          <div class="diag-label">Discipline</div>
          <div class="diag-val">${d.hds.toFixed(2)}</div>
          <div class="diag-sub">${d.hds >= 0.7 ? 'Strong discipline' : d.hds >= 0.4 ? 'Moderate' : 'Low discipline'}</div>
        </div>
        <div class="diag-cell">

        </div>
        <div class="diag-cell">
          <div class="diag-label">Direction</div>
          <div class="diag-val" style="color:${dc.color}">${dir}</div>
          <div class="diag-sub">Forecast direction</div>

          <div class="diag-sub">${fvdStatus}${fv !== '—' ? ' · FV ' + fv : ''}</div>

      </div>

      <!-- Warranted vs Hype -->
      <div class="wh-section">
        <div class="wh-title">Warranted vs Hype</div>
        <div class="wh-labels">
          <span style="color:var(--mp-green)">WARRANTED ${warranted}</span>
          <span style="color:var(--mp-red)">HYPE ${hype}</span>

        <div class="wh-bar-track">
          <div class="wh-bar-fill" style="width:100%"></div>
          <div class="wh-marker" style="left:${warranted}%"></div>
        </div>
        <div class="wh-stats">
          <div class="wh-stat">
            <div class="wh-stat-val" style="color:var(--mp-green)">${evidence}</div>
            <div class="wh-stat-lbl">Evidence</div>
          </div>

            <div class="wh-stat-val" style="color:var(--mp-cyan)">${tractability}</div>
            <div class="wh-stat-lbl">Tractability</div>

          <div class="wh-stat">
            <div class="wh-stat-val" style="color:var(--mp-amber)">${Math.abs(d.fair_value_deviation_pct || 0).toFixed(0)}</div>
            <div class="wh-stat-lbl">Val. Stretch</div>
          </div>
          <div class="wh-stat">
            <div class="wh-stat-val" style="color:var(--mp-red)">${d.drift_score}</div>
            <div class="wh-stat-lbl">Pressure</div>

      <!-- Price Strip -->
      ${d.price_high || d.price_low || d.volume_day ? `

        <div class="diag-cell">

          <div class="diag-val" style="color:var(--mp-cyan)">${cp}</div>

          <span class="claim-pill ${d.has_source_ref ? 'good' : 'bad'}">${d.has_source_ref ? '✓' : '✗'} Source Cited</span>
          <span class="claim-pill ${d.has_timeframe ? 'good' : 'bad'}">${d.has_timeframe ? '✓' : '✗'} Timeframe Given</span>

          ${d.hype_adjective_count != null ? `<span class="claim-pill ${d.hype_adjective_count === 0 ? 'good' : 'bad'}">${d.hype_adjective_count} Hype Words</span>` : ''}

      <!-- Sentiment & Headlines -->
      ${d.sentiment != null || (d.top_headlines && d.top_headlines.length) ? `

            const url = d.article_urls && d.article_urls[i] ? d.article_urls[i] : null;
            const title = url ? `<a href="${url}" target="_blank" rel="noopener" style="color:var(--mp-text-secondary);text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='var(--mp-cyan)'" onmouseout="this.style.color='var(--mp-text-secondary)'">${h}</a>` : h;
            const source = d.sources && d.sources[i] ? d.sources[i] : '';
            return `<li>${title}${source ? '<div class="headline-source">' + source + '</div>' : ''}</li>`;
          }).join('')}
        </ul>` : ''}
      </div>` : ''}

      <!-- Footer -->
      <div class="sc-footer">
        <span>${d.snapshot_date}</span>
        ${d.agent_latency_ms ? `<span>${(d.agent_latency_ms / 1000).toFixed(1)}s analysis</span>` : ''}
        ${d.data_quality && d.data_quality !== 'good' ? `<span style="color:var(--mp-amber)">Data: ${d.data_quality}</span>` : ''}
        ${lastFromCache ? `<span style="color:var(--mp-teal)">cached</span>` : ''}
        <div class="export-wrap">
          <button class="export-btn" onclick="toggleExportMenu(event)">Export &#9662;</button>
          <div class="export-menu">
            <button onclick="exportCard('jpeg','${d.ticker}')">Save as JPEG</button>
            <button onclick="exportCard('pdf','${d.ticker}')">Save as PDF</button>
          </div>
        </div>
        <span style="margin-left:auto;color:var(--mp-text-muted)">SRS ${d.srs} · ACS ${d.acs} · CVS ${d.cvs}</span>
      </div>
    </div>
  `;
}

/* ── Batch Table ── */
function renderBatchTable() {
  if (!batchData.length) {
    document.getElementById('batch-results').innerHTML = '<p style="text-align:center;color:var(--mp-text-muted);padding:24px;">No results returned.</p>';
    return;
  }
  const cols = [
    { key: 'ticker', label: 'Ticker' },
    { key: 'current_price', label: 'Price' },
    { key: 'verdict', label: 'Verdict' },
    { key: 'ccp', label: 'Confidence' },
    { key: 'nrs', label: 'Risk' },
    { key: 'vms', label: 'Evidence' },
    { key: 'fair_value_deviation_pct', label: 'FV Gap' },
    { key: 'trade_direction', label: 'Direction' },
  ];
  if (sortCol) {
    batchData.sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va == null) va = -Infinity; if (vb == null) vb = -Infinity;
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
  }
  let html = '<div class="batch-table-wrap"><table class="batch-table"><thead><tr>';
  cols.forEach(c => {
    const sorted = sortCol === c.key;
    const arrow = sorted ? (sortAsc ? '&#9650;' : '&#9660;') : '&#9650;';
    html += `<th class="${sorted ? 'sorted' : ''}" onclick="sortBatch('${c.key}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';
  batchData.forEach((d, i) => {
    const vm = VERDICT_MAP[d.verdict] || { color: '#A0A8B0' };
    const dir = d.trade_direction || 'HOLD';
    const dc = DIR_COLORS[dir] || DIR_COLORS.HOLD;
    const fvd = d.fair_value_deviation_pct;
    const fvdStr = fvd == null ? '—' : ((fvd > 0 ? '+' : '') + fvd.toFixed(1) + '%');
    const fvdColor = fvd == null ? 'var(--mp-text-muted)' : (fvd > 0 ? 'var(--mp-red)' : 'var(--mp-green)');
    html += `<tr onclick="toggleExpand(${i})">
      <td class="ticker-col">${d.ticker}</td>
      <td>$${d.current_price.toFixed(2)}</td>
      <td style="color:${vm.color}">${d.verdict}</td>
      <td>${d.ccp}</td>
      <td style="color:${scoreColor(d.nrs, true)}">${d.nrs}</td>
      <td>${d.vms}</td>
      <td style="color:${fvdColor}">${fvdStr}</td>
      <td style="color:${dc.color}">${dir}</td>
    </tr>`;
    html += `<tr class="batch-expanded" id="expand-${i}"><td colspan="8">${buildScoreCard(d)}</td></tr>`;
  });
  html += '</tbody></table></div>';
  document.getElementById('batch-results').innerHTML = html;
}

function sortBatch(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  renderBatchTable();
  document.getElementById('batch-results').classList.add('visible');
}

function toggleExpand(i) {
  const row = document.getElementById('expand-' + i);
  if (row) row.classList.toggle('visible');
}

/* ── Export ── */
function toggleExportMenu(e) {
  e.stopPropagation();
  const menu = e.currentTarget.nextElementSibling;
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.export-menu.open').forEach(m => m.classList.remove('open'));
  if (!wasOpen) menu.classList.add('open');
}
document.addEventListener('click', () => document.querySelectorAll('.export-menu.open').forEach(m => m.classList.remove('open')));

async function exportCard(format, ticker) {
  document.querySelectorAll('.export-menu.open').forEach(m => m.classList.remove('open'));
  const card = document.querySelector('.score-card');
  if (!card) return;
  try {
    const canvas = await html2canvas(card, { backgroundColor: '#080B11', scale: 2, useCORS: true });
    if (format === 'jpeg') {
      const link = document.createElement('a');
      link.download = ticker + '-score.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();
    } else {
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pxW = canvas.width;
      const pxH = canvas.height;
      const pdfW = pxW * 0.264583;
      const pdfH = pxH * 0.264583;
      const jspdf = window.jspdf || window.jsPDF;
      const doc = new (jspdf.jsPDF || jspdf)({ orientation: pdfW > pdfH ? 'l' : 'p', unit: 'mm', format: [pdfW, pdfH] });
      doc.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
      doc.save(ticker + '-score.pdf');
    }
  } catch (err) { console.error('Export failed:', err); alert('Export failed — see console for details.'); }
}

/* ── Keyboard + Init ── */
document.getElementById('ticker-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') scoreSingle(); });
window.addEventListener('DOMContentLoaded', function() { checkHealth(); });
</script>
