<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --bg: #0B0F14;
  --deep: #0E1319;
  --surface: #131920;
  --surface2: #181f28;
  --border: rgba(255,255,255,0.06);
  --border-mid: rgba(255,255,255,0.10);
  --blue: #00AEFF;
  --teal: #00DE94;
  --tx1: #F5F7FA;
  --tx2: #A0A8B0;
  --tx3: #4A5578;
  --font-d: 'Instrument Serif', 'DM Serif Display', Georgia, serif;
  --font-b: 'Inter', system-ui, sans-serif;
}
html { font-size: 16px; }
body {
  font-family: var(--font-b);
  background: var(--bg);
  color: var(--tx1);
  line-height: 1.6;
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex; align-items: center;
  padding: 0 40px;
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-right: 32px; }
.nav-logo-img { height: 32px; width: auto; }
.nav-links { display: flex; align-items: center; gap: 4px; flex: 1; }
.nav-link { font-size: 13px; color: var(--tx3); text-decoration: none; padding: 6px 12px; border-radius: 6px; }
.nav-link:hover { color: var(--tx2); background: var(--surface); }
.nav-link.active { color: var(--tx1); background: var(--surface); }
.nav-right { margin-left: auto; }
.btn-nav {
  font-size: 13px; color: #fff; background: rgba(255,255,255,0.1);
  border: none; border-radius: 8px; padding: 7px 18px;
  cursor: pointer; text-decoration: none;
}
.con { max-width: 720px; margin: 0 auto; padding: 0 40px; }

.author-header {
  padding: 64px 0 32px;
  border-bottom: 1px solid var(--border);
}
.author-back {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--tx3); text-decoration: none;
  margin-bottom: 28px;
}
.author-back:hover { color: var(--tx2); }
.author-back svg { width: 14px; height: 14px; }

.author-card {
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 28px;
}
.author-avatar {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), var(--teal));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d);
  font-size: 36px;
  color: #0B0F14;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}
.author-name {
  font-family: var(--font-d);
  font-size: clamp(28px, 4vw, 40px);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 6px;
}
.author-role {
  font-size: 13px;
  color: var(--blue);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 500;
}
.author-bio {
  font-size: 16px;
  color: var(--tx2);
  line-height: 1.7;
  max-width: 600px;
}

.author-section {
  padding: 40px 0 80px;
}
.author-section-title {
  font-family: var(--font-d);
  font-size: 20px;
  font-weight: 400;
  color: var(--tx1);
  letter-spacing: -0.01em;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.author-feed { display: flex; flex-direction: column; }
.author-feed-item {
  display: block;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  text-decoration: none;
  color: inherit;
  transition: background .15s;
}
.author-feed-item:hover { background: rgba(255,255,255,0.015); }
.author-feed-item:hover .author-feed-title { color: var(--blue); }
.author-feed-tag {
  font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 6px;
}
.author-feed-title {
  font-family: var(--font-d);
  font-size: 18px; font-weight: 400; color: var(--tx1);
  line-height: 1.3; margin-bottom: 6px;
  letter-spacing: -0.01em;
  transition: color .15s;
}
.author-feed-meta {
  font-size: 11px; color: var(--tx3);
  display: flex; gap: 8px; align-items: center;
}
.author-feed-meta-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--tx3); }

.blog-footer { border-top: 1px solid var(--border); padding: 28px 0; text-align: center; }
.blog-footer-text { font-size: 10px; color: var(--tx3); }
.blog-footer-text a { color: var(--tx2); text-decoration: none; }

@media (max-width: 768px) {
  .con { padding: 0 20px; }
  nav { padding: 0 16px; }
  .nav-links { display: none; }
  .author-card { flex-direction: column; align-items: flex-start; gap: 16px; }
  .author-avatar { width: 72px; height: 72px; font-size: 28px; }
}

<nav>

  </a>

  </div>
  <div class="nav-right">

  </div>

<div class="author-header">

    <a href="/blog" class="author-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 19l-7-7 7-7"/></svg>
      Intelligence Journal
    </a>

<div class="author-section">

    <div class="author-feed" id="author-feed">
      <div style="padding:32px 0;text-align:center;color:var(--tx3);font-size:13px;">Loading articles...</div>
    </div>
  </div>
</div>

  <div class="blog-footer-text">
    <a href="/">Market Prism</a> &middot; Patent Pending: 63/971,470 &amp; 63/971,478 &middot; &copy; 2025–2026
  </div>
</div>

<script>
var SUPABASE_URL = window.__env && window.__env.SUPABASE_URL ? window.__env.SUPABASE_URL : '';
var SUPABASE_ANON = window.__env && window.__env.SUPABASE_ANON ? window.__env.SUPABASE_ANON : '';

function fmtDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

async function loadArticles(authorName) {
  var feed = document.getElementById('author-feed');
  if (!SUPABASE_URL || !SUPABASE_ANON) {
    feed.innerHTML = '<div style="padding:32px 0;text-align:center;color:var(--tx3);font-size:13px;">Configuration missing.</div>';
    return;
  }
  try {
    var url = SUPABASE_URL + '/rest/v1/blog_posts'
      + '?author=eq.' + encodeURIComponent(authorName)
      + '&status=eq.published'
      + '&select=ticker,slug,title,excerpt,tag,published_at,body'
      + '&order=published_at.desc'
      + '&limit=30';
    var res = await fetch(url, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var posts = await res.json();
    if (!posts.length) {
      feed.innerHTML = '<div style="padding:32px 0;text-align:center;color:var(--tx3);font-size:13px;">No articles yet.</div>';
      return;
    }
    feed.innerHTML = posts.map(function(p) {
      var read = Math.max(3, Math.round((p.body || '').trim().split(/\s+/).length / 200)) + ' min read';
      return '<a class="author-feed-item" href="/blog/' + escHtml(p.slug) + '">'
        + '<div class="author-feed-tag">' + escHtml(p.tag || 'Research') + (p.ticker && p.ticker !== 'MP' ? ' &middot; ' + escHtml(p.ticker) : '') + '</div>'
        + '<div class="author-feed-title">' + escHtml(p.title || '') + '</div>'
        + '<div class="author-feed-meta">'
        + '<span>' + escHtml(fmtDate(p.published_at)) + '</span>'
        + '<span class="author-feed-meta-sep"></span>'
        + '<span>' + read + '</span>'
        + '</div></a>';
    }).join('');
  } catch (e) {
    feed.innerHTML = '<div style="padding:32px 0;text-align:center;color:var(--tx3);font-size:13px;">Failed to load articles.</div>';
    console.error('[author]', e);
  }
}

document.addEventListener('DOMContentLoaded', function(){
  var name = document.getElementById('author-name').textContent.trim();
  if (name && name !== 'Author') loadArticles(name);
});
</script>
