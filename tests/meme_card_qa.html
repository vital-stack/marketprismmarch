<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meme Card QA — Market Prism</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #080B11;
    color: #FFFFFF;
    padding: 24px 32px 80px;
  }
  h1 { font-family: Georgia, serif; font-size: 28px; font-weight: 400; margin-bottom: 6px; letter-spacing: -0.02em; }
  .sub { font-size: 13px; color: #B4BCC8; margin-bottom: 24px; }
  .controls {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: #0C1018; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
  }
  .controls label { font-size: 12px; color: #B4BCC8; }
  .controls input {
    background: #111927; color: #FFFFFF;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; width: 320px;
  }
  .controls button {
    background: transparent; color: #00DE94;
    border: 1px solid rgba(0,222,148,0.40); border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    cursor: pointer;
  }
  .controls button:hover { background: rgba(0,222,148,0.10); }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 24px;
  }
  .card-wrap {
    background: #0C1018; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; overflow: hidden;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px;
  }
  .card-head .ticker { font-weight: 600; }
  .card-head .variant.bull { color: #00DE94; }
  .card-head .variant.bear { color: #FFB800; }
  .card-head a { color: #B4BCC8; font-size: 11px; text-decoration: none; }
  .card-head a:hover { color: #FFFFFF; text-decoration: underline; }
  .card-img {
    width: 100%; aspect-ratio: 1080 / 1350; display: block;
    background: #08090C;
    object-fit: cover;
  }
  .card-err {
    padding: 24px; font-size: 12px; color: #FF7777;
    aspect-ratio: 1080 / 1350; display: flex; align-items: center; justify-content: center; text-align: center;
  }
</style>
</head>
<body>
  <h1>Meme card visual QA</h1>
  <div class="sub">Renders both variants for RDDT, AAPL, NVDA, TSLA against the configured base URL. Refresh the page after editing the renderer to re-fetch.</div>
  <div class="controls">
    <label for="base">Base URL</label>
    <input id="base" type="text" value="" placeholder="leave blank to use this page's origin">
    <label for="tickers">Tickers</label>
    <input id="tickers" type="text" value="RDDT,AAPL,NVDA,TSLA">
    <button id="reload">Reload</button>
  </div>
  <div class="grid" id="grid"></div>

<script>
(function () {
  function parseTickers() {
    var raw = document.getElementById('tickers').value || '';
    return raw.split(',').map(function (s) { return s.trim().toUpperCase(); }).filter(Boolean);
  }
  function baseUrl() {
    var b = (document.getElementById('base').value || '').trim();
    return b.replace(/\/$/, '');
  }
  function render() {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    var tickers = parseTickers();
    var base = baseUrl();
    var ts = Date.now();
    tickers.forEach(function (ticker) {
      ['bull', 'bear'].forEach(function (variant) {
        var url = (base || '') + '/api/tickers/' + encodeURIComponent(ticker) + '/meme-card?variant=' + variant + '&_=' + ts;
        var jsonUrl = url + '&format=json';
        var wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.innerHTML =
          '<div class="card-head">' +
            '<span><span class="ticker">' + ticker + '</span> <span class="variant ' + variant + '">' + variant.toUpperCase() + '</span></span>' +
            '<a href="' + jsonUrl + '" target="_blank">view JSON</a>' +
          '</div>' +
          '<img class="card-img" alt="' + ticker + ' ' + variant + '" src="' + url + '" ' +
            'onerror="this.outerHTML=\'<div class=card-err>Render failed for ' + ticker + ' / ' + variant + '. Check console + server logs.</div>\'">';
        grid.appendChild(wrap);
      });
    });
  }
  document.getElementById('reload').addEventListener('click', render);
  render();
})();
</script>
</body>
</html>
