<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <!-- Top-left face gradient: teal to cyan -->
    <linearGradient id="fTL" x1="10" y1="12" x2="32" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00C9A7"/>
      <stop offset="50%" stop-color="#00AEFF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Top-right face gradient: blue to violet/pink -->
    <linearGradient id="fTR" x1="54" y1="12" x2="32" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E040A0"/>
      <stop offset="40%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Bottom-left face gradient: yellow/green -->
    <linearGradient id="fBL" x1="8" y1="58" x2="32" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="40%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#00AEFF"/>
    </linearGradient>
    <!-- Bottom-right face gradient: orange/pink -->
    <linearGradient id="fBR" x1="56" y1="58" x2="32" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4D6A"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Inner diamond: bright center -->
    <linearGradient id="fC" x1="20" y1="28" x2="44" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFDE8"/>
      <stop offset="50%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
  </defs>
  <!-- Top-left face -->
  <path d="M32 6 L10 38 L32 38 Z" fill="url(#fTL)" opacity="0.92"/>
  <!-- Top-right face -->
  <path d="M32 6 L54 38 L32 38 Z" fill="url(#fTR)" opacity="0.92"/>
  <!-- Bottom-left face -->
  <path d="M10 38 L24 58 L32 38 Z" fill="url(#fBL)" opacity="0.88"/>
  <!-- Bottom-right face -->
  <path d="M54 38 L40 58 L32 38 Z" fill="url(#fBR)" opacity="0.88"/>
  <!-- Bottom center face -->
  <path d="M24 58 L32 38 L40 58 Z" fill="url(#fC)" opacity="0.7"/>
  <!-- Inner diamond highlight -->
  <path d="M32 22 L22 38 L32 50 L42 38 Z" fill="url(#fC)" opacity="0.35"/>
  <!-- Edge highlights -->
  <path d="M32 6 L10 38" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
  <path d="M32 6 L54 38" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
  <path d="M10 38 L24 58" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <path d="M54 38 L40 58" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <path d="M32 38 L32 6" stroke="rgba(255,255,255,0.12)" stroke-width="0.4"/>
</svg>
