<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="f1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00AEFF"/>
      <stop offset="35%" stop-color="#7B61FF"/>
      <stop offset="65%" stop-color="#FF4D8B"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="f2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#00DE94"/>
      <stop offset="50%" stop-color="#00AEFF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <linearGradient id="f3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="50%" stop-color="#FF4D8B"/>
      <stop offset="100%" stop-color="#00DE94"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00AEFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7B61FF" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#080B11"/>
  <!-- Main prism triangle -->
  <polygon points="32,10 50,50 14,50" fill="url(#fg)" stroke="url(#f1)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner facet - left -->
  <polygon points="32,10 14,50 32,38" fill="url(#f2)" opacity="0.3"/>
  <!-- Inner facet - right -->
  <polygon points="32,10 50,50 32,38" fill="url(#f3)" opacity="0.3"/>
  <!-- Light dispersion rays from right side -->
  <line x1="42" y1="28" x2="54" y2="22" stroke="#FF4D4D" stroke-width="1" opacity="0.7"/>
  <line x1="43" y1="31" x2="55" y2="28" stroke="#FFB800" stroke-width="1" opacity="0.7"/>
  <line x1="44" y1="34" x2="56" y2="34" stroke="#00DE94" stroke-width="1" opacity="0.7"/>
  <line x1="43" y1="37" x2="55" y2="40" stroke="#00AEFF" stroke-width="1" opacity="0.7"/>
  <line x1="42" y1="40" x2="54" y2="46" stroke="#7B61FF" stroke-width="1" opacity="0.7"/>
  <!-- Apex glow -->
  <circle cx="32" cy="12" r="4" fill="#fff" opacity="0.15"/>
</svg>
