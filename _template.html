<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Market Prism</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mp-obsidian: #0A0E1A;
    --mp-deep: #0F1628;
    --mp-surface: #141D35;
    --mp-border: rgba(255,255,255,0.08);
    --mp-border-mid: rgba(255,255,255,0.14);
    --mp-blue: #1A6EFF;
    --mp-blue-glow: rgba(26,110,255,0.2);
    --mp-cyan: #00C2FF;
    --mp-teal: #00E5B4;
    --mp-prism-4: #7B61FF;
    --mp-prism-5: #FF6B6B;
    --mp-text-primary: #F0F4FF;
    --mp-text-secondary: #8B97B8;
    --mp-text-tertiary: #4A5578;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font-body);
    background: var(--mp-obsidian);
    color: var(--mp-text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Side Navigation ── */
  .side-nav {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    background: var(--mp-deep);
    border-right: 1px solid var(--mp-border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow-y: auto;
  }
  .nav-logo {
    padding: 24px 20px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .nav-logo svg {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .nav-logo span {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--mp-text-primary);
    letter-spacing: -0.01em;
  }
  .nav-items {
    padding: 8px 12px;
    flex: 1;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-family: var(--font-body);
    font-weight: 400;
    color: var(--mp-text-secondary);
    text-decoration: none;
    transition: background 0.12s, color 0.12s;
    margin-bottom: 2px;
    border-left: 2px solid transparent;
  }
  .nav-item:hover {
    background: var(--mp-surface);
    color: var(--mp-text-primary);
  }
  .nav-item.active {
    background: rgba(26,110,255,0.1);
    color: #1A6EFF;
    border-left: 2px solid #1A6EFF;
  }
  .nav-item svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .nav-item.active svg { opacity: 1; }
  .nav-divider {
    height: 1px;
    background: var(--mp-border);
    margin: 12px 20px;
  }
  .nav-bottom {
    padding: 16px 20px;
    border-top: 1px solid var(--mp-border);
  }
  .nav-bottom a {
    font-size: 11px;
    color: var(--mp-text-tertiary);
    text-decoration: none;
    transition: color 0.12s;
  }
  .nav-bottom a:hover { color: var(--mp-text-secondary); }

  /* ── Mobile hamburger ── */
  .mobile-topbar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: var(--mp-deep);
    border-bottom: 1px solid var(--mp-border);
    z-index: 200;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
  }
  .hamburger-btn {
    background: none;
    border: none;
    color: var(--mp-text-primary);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .hamburger-btn svg { width: 22px; height: 22px; }
  .mobile-topbar .nav-logo {
    padding: 0;
  }
  .nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
  }
  .nav-overlay.open { display: block; }

  /* ── Main Content ── */
  .main-content {
    margin-left: 240px;
    max-width: 960px;
    padding: 32px 40px 80px;
  }

  /* ── Page Header ── */
  .page-header {
    margin-bottom: 28px;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    color: var(--mp-text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .page-header p {
    font-size: 13px;
    color: var(--mp-text-tertiary);
  }

  /* ── Stats Row ── */
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    flex: 1;
    background: var(--mp-deep);
    border: 1px solid var(--mp-border);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .stat-card .stat-num {
    font-size: 22px;
    font-weight: 500;
    font-family: var(--font-mono);
    color: var(--mp-text-primary);
    display: block;
    margin-bottom: 2px;
  }
  .stat-card .stat-label {
    font-size: 11px;
    color: var(--mp-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Filters ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .filter-sep {
    width: 1px;
    height: 20px;
    background: var(--mp-border-mid);
    margin: 0 4px;
  }
  .filter-label {
    font-size: 11px;
    color: var(--mp-text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--mp-border);
    background: var(--mp-surface);
    cursor: pointer;
    color: var(--mp-text-secondary);
    font-family: var(--font-body);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .chip:hover { border-color: var(--mp-border-mid); color: var(--mp-text-primary); }
  .chip.active {
    background: var(--mp-blue);
    color: #FFFFFF;
    border-color: var(--mp-blue);
  }
  .chip.active-breaking { background: rgba(255,107,107,0.12); color: #FF6B6B; border-color: rgba(255,107,107,0.3); }
  .chip.active-surging  { background: rgba(0,229,180,0.1);  color: #00E5B4;  border-color: rgba(0,229,180,0.25); }
  .chip.active-fragile  { background: rgba(239,159,39,0.1); color: #EF9F27;  border-color: rgba(239,159,39,0.25); }
  .chip.active-stable   { background: rgba(26,110,255,0.1); color: #1A6EFF;  border-color: rgba(26,110,255,0.25); }

  .search-wrap { margin-left: auto; }
  .search-input {
    font-size: 13px;
    font-family: var(--font-mono);
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid var(--mp-border-mid);
    background: var(--mp-deep);
    color: var(--mp-text-primary);
    width: 160px;
    outline: none;
    transition: border-color 0.12s;
  }
  .search-input:focus { border-color: var(--mp-blue); }
  .search-input::placeholder { color: var(--mp-text-tertiary); }

  .filter-bar-2 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .filter-select {
    font-size: 12px;
    font-family: var(--font-body);
    padding: 5px 10px;
    border-radius: 99px;
    border: 1px solid var(--mp-border);
    background: var(--mp-surface);
    color: var(--mp-text-secondary);
    cursor: pointer;
    outline: none;
    transition: border-color 0.12s;
    max-width: 220px;
  }
  .filter-select option {
    background: var(--mp-deep);
    color: var(--mp-text-primary);
  }
  .filter-select:focus { border-color: var(--mp-blue); }
  .filter-select:hover { border-color: var(--mp-border-mid); color: var(--mp-text-primary); }

  /* FVD tag */
  .fvd-tag strong { font-weight: 500; }
  .fvd-under strong { color: var(--mp-teal); }
  .fvd-over  strong { color: var(--mp-prism-5); }

  /* Sector label on card */
  .meta-sector {
    font-size: 11px;
    color: var(--mp-text-tertiary);
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .count-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--mp-text-tertiary);
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--mp-border);
  }

  /* ── Feed ── */
  .feed { display: flex; flex-direction: column; gap: 12px; }

  .story-card {
    padding: 16px;
    background: var(--mp-deep);
    border: 1px solid var(--mp-border);
    border-radius: 12px;
    transition: border-color 0.15s, transform 0.15s;
    display: block;
    text-decoration: none;
    color: inherit;
  }
  .story-card:hover {
    border-color: var(--mp-border-mid);
    transform: translateY(-1px);
  }
  .story-card:hover .card-arrow { opacity: 1; }

  .card-arrow {
    font-size: 18px;
    color: var(--mp-text-tertiary);
    opacity: 0;
    transition: opacity 0.12s;
    line-height: 1;
    margin-left: 6px;
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-left {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .ticker-badge {
    font-size: 11px;
    font-weight: 500;
    font-family: var(--font-mono);
    min-width: 52px;
    text-align: center;
    padding: 4px 8px;
    border-radius: 5px;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    border: 1px solid;
  }
  .badge-breaking { background: rgba(255,107,107,0.12); color: #FF6B6B; border-color: rgba(255,107,107,0.3); }
  .badge-surging  { background: rgba(0,229,180,0.1);  color: #00E5B4;  border-color: rgba(0,229,180,0.25); }
  .badge-fragile  { background: rgba(239,159,39,0.1); color: #EF9F27;  border-color: rgba(239,159,39,0.25); }
  .badge-stable   { background: rgba(26,110,255,0.1); color: #1A6EFF;  border-color: rgba(26,110,255,0.25); }

  .verdict-pip {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }
  .pip-trap      { background: var(--mp-prism-5); }
  .pip-supported { background: var(--mp-teal); }
  .pip-monitoring { background: var(--mp-text-tertiary); }

  .story-claim {
    font-size: 14px;
    color: var(--mp-text-primary);
    line-height: 1.5;
  }

  .price-block {
    text-align: right;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .price-nums { text-align: right; }
  .price-main {
    font-size: 14px;
    font-weight: 500;
    font-family: var(--font-mono);
    color: #FFFFFF;
  }
  .price-delta { font-size: 12px; font-family: var(--font-mono); }
  .delta-pos { color: var(--mp-teal); }
  .delta-neg { color: var(--mp-prism-5); }
  .delta-flat { color: var(--mp-text-tertiary); }

  /* ── Meta row ── */
  .card-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .meta-tag {
    font-size: 12px;
    color: var(--mp-text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-tag strong {
    font-weight: 500;
    color: var(--mp-text-secondary);
  }
  .trend-up   strong { color: var(--mp-teal); }
  .trend-down strong { color: var(--mp-prism-5); }
  .trend-flat strong { color: var(--mp-text-tertiary); }

  .meta-date {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--mp-text-tertiary);
    margin-left: auto;
  }

  .verdict-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 500;
    border: 1px solid;
  }
  .verdict-trap      { background: rgba(255,107,107,0.12); color: #FF6B6B; border-color: rgba(255,107,107,0.3); }
  .verdict-supported { background: rgba(0,229,180,0.1); color: var(--mp-teal); border-color: rgba(0,229,180,0.25); }

  /* ── Load more ── */
  .load-more {
    text-align: center;
    margin-top: 32px;
  }
  .load-more-btn {
    font-size: 13px;
    font-family: var(--font-body);
    padding: 10px 28px;
    border-radius: 99px;
    border: 1px solid var(--mp-border-mid);
    background: var(--mp-surface);
    color: var(--mp-text-secondary);
    cursor: pointer;
    transition: all 0.12s;
  }
  .load-more-btn:hover {
    background: var(--mp-blue);
    color: white;
    border-color: var(--mp-blue);
  }

  .empty-state {
    padding: 60px 0;
    text-align: center;
    color: var(--mp-text-tertiary);
    font-size: 14px;
  }

  /* ── Mobile ── */
  @media (max-width: 767px) {
    .side-nav {
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .side-nav.open {
      transform: translateX(0);
    }
    .mobile-topbar {
      display: flex;
    }
    .main-content {
      margin-left: 0;
      padding: 72px 16px 80px;
    }
    .stats-row {
      flex-direction: column;
      gap: 10px;
    }
    .search-wrap {
      margin-left: 0;
      width: 100%;
    }
    .search-input {
      width: 100%;
    }
  }
</style>
  <!-- Env vars injected by Vercel API handler — do not edit this line -->
  <script id="__env_script">window.__env = { SUPABASE_URL: '', SUPABASE_ANON: '' };</script>
</head>
<body>

<!-- Mobile Top Bar -->
<div class="mobile-topbar">
  <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,26 2,26" stroke="#1A6EFF" stroke-width="1.5" fill="none"/><polygon points="14,9 21,23 7,23" stroke="#00C2FF" stroke-width="1" fill="rgba(26,110,255,0.15)"/></svg>
    <span>Market Prism</span>
  </div>
</div>
<div class="nav-overlay" id="nav-overlay"></div>

<!-- Side Navigation -->
<nav class="side-nav" id="side-nav">
  <div class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><polygon points="14,2 26,26 2,26" stroke="#1A6EFF" stroke-width="1.5" fill="none"/><polygon points="14,9 21,23 7,23" stroke="#00C2FF" stroke-width="1" fill="rgba(26,110,255,0.15)"/></svg>
    <span>Market Prism</span>
  </div>
  <div class="nav-items">
    <a class="nav-item active" href="/dashboard">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="1.5" width="5" height="5" rx="1"/><rect x="9.5" y="1.5" width="5" height="5" rx="1"/><rect x="1.5" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/></svg>
      Dashboard
    </a>
    <a class="nav-item" href="/heatmap">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="1" width="4.5" height="6" rx="0.5"/><rect x="7" y="1" width="8" height="6" rx="0.5"/><rect x="1" y="9" width="8" height="6" rx="0.5"/><rect x="10.5" y="9" width="4.5" height="6" rx="0.5"/></svg>
      Heatmap
    </a>
  </div>
  <div class="nav-divider"></div>
  <div class="nav-bottom">
    <a href="/">&larr; Back to Home</a>
  </div>
</nav>

<!-- Main Content -->
<div class="main-content">

  <div class="page-header">
    <h1>Market Prism</h1>
    <p id="header-date"></p>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">&mdash;</span>
      <span class="stat-label">Tickers</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-traps">&mdash;</span>
      <span class="stat-label">Traps</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-breaking">&mdash;</span>
      <span class="stat-label">Breaking</span>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">State</span>
    <div class="filter-group">
      <button class="chip active" data-filter="state" data-val="all">All</button>
      <button class="chip" data-filter="state" data-val="Breaking">Breaking</button>
      <button class="chip" data-filter="state" data-val="Surging">Surging</button>
      <button class="chip" data-filter="state" data-val="Fragile">Fragile</button>
      <button class="chip" data-filter="state" data-val="Stable">Stable</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Verdict</span>
    <div class="filter-group">
      <button class="chip" data-filter="verdict" data-val="Narrative Trap">Trap</button>
      <button class="chip" data-filter="verdict" data-val="Structurally Supported">Supported</button>
    </div>
    <div class="search-wrap">
      <input id="ticker-search" class="search-input" placeholder="Search ticker…" />
    </div>
  </div>

  <div class="filter-bar-2">
    <div class="filter-group">
      <span class="filter-label">Sector</span>
      <select id="sector-select" class="filter-select">
        <option value="">All sectors</option>
      </select>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Value</span>
    <div class="filter-group">
      <button class="chip" data-sort="undervalued">&darr; Undervalued</button>
      <button class="chip" data-sort="overvalued">&uarr; Overvalued</button>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      <button class="chip" data-sort="default">A &rarr; Z</button>
    </div>
  </div>

  <div class="count-bar">
    <span id="count-line">&mdash;</span>
    <span style="font-size:11px;">click any ticker to open full forensic analysis</span>
  </div>

  <div class="feed" id="feed"></div>

  <div class="load-more" id="load-more-wrap" style="display:none;">
    <button class="load-more-btn" id="load-more-btn">Load more</button>
  </div>

</div>

<script>
// ── Mobile nav toggle ────────────────────────────────────────────────────────
(function() {
  var hamburger = document.getElementById('hamburger-btn');
  var sideNav = document.getElementById('side-nav');
  var overlay = document.getElementById('nav-overlay');
  function openNav() { sideNav.classList.add('open'); overlay.classList.add('open'); }
  function closeNav() { sideNav.classList.remove('open'); overlay.classList.remove('open'); }
  hamburger.addEventListener('click', function() {
    sideNav.classList.contains('open') ? closeNav() : openNav();
  });
  overlay.addEventListener('click', closeNav);
})();

// ── Set header date ──────────────────────────────────────────────────────────
document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

// ── Supabase config (injected by Vercel env vars) ──────────────────────────
const SUPABASE_URL  = window.__env?.SUPABASE_URL  || '';
const SUPABASE_ANON = window.__env?.SUPABASE_ANON || '';

const COLS = [
  'ticker','price','price_change_pct','narrative_state','primary_driver',
  'prism_verdict','story_claim','pe_ratio','days_to_earnings',
  'eps_surprise_pct','guidance_direction','institutional_positioning',
  'fair_value','snapshot_date','sector_name','recovery_probability'
].join(',');

let DATA = [];

async function loadData() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '<div class="empty-state" style="padding:48px 0;">Loading stories…</div>';

  try {
    if (!SUPABASE_URL || !SUPABASE_ANON) {
      throw new Error('Missing Supabase credentials – SUPABASE_URL or SUPABASE_ANON is empty');
    }

    const url = `${SUPABASE_URL}/rest/v1/v_dash_daily_story` +
      `?select=${COLS}` +
      `&story_claim=not.is.null` +
      `&order=snapshot_date.desc,ticker.asc`;

    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Accept': 'application/json'
      }
    });

    if (!res.ok) {
      const body = await res.text().catch(() => '');
      throw new Error(`Supabase error: ${res.status} – ${body}`);
    }

    const rows = await res.json();

    // Fetch narrative health for trend indicators
    let healthMap = {};
    try {
      const healthUrl = `${SUPABASE_URL}/rest/v1/v_dash_narrative_health` +
        `?select=ticker,narrative_health,narrative_trend,attention_trend` +
        `&order=snapshot_date.desc`;
      const hr = await fetch(healthUrl, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Accept': 'application/json' }
      });
      if (hr.ok) {
        const hrows = await hr.json();
        // Keep latest row per ticker
        hrows.forEach(h => { if (!healthMap[h.ticker]) healthMap[h.ticker] = h; });
      }
    } catch {}

    // Fetch latest ticker_snapshots to fill in fresher price data
    let snapMap = {};
    try {
      const snapUrl = `${SUPABASE_URL}/rest/v1/ticker_snapshots` +
        `?select=ticker,snapshot_date,price_close,price_change_pct` +
        `&order=snapshot_date.desc,ticker.asc`;
      const sr = await fetch(snapUrl, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Accept': 'application/json' }
      });
      if (sr.ok) {
        const srows = await sr.json();
        // Keep latest snapshot per ticker
        srows.forEach(s => { if (!snapMap[s.ticker]) snapMap[s.ticker] = s; });
      }
    } catch {}

    // Deduplicate by ticker (keep first occurrence) and merge health data
    const seen = new Set();
    DATA = rows.filter(r => {
      if (seen.has(r.ticker)) return false;
      seen.add(r.ticker);
      return true;
    }).map(r => {
      const merged = { ...r, ...(healthMap[r.ticker] || {}) };
      // If ticker_snapshots has newer data, overlay price fields
      const snap = snapMap[merged.ticker];
      if (snap && snap.snapshot_date > (merged.snapshot_date || '')) {
        merged.price = snap.price_close;
        merged.price_change_pct = snap.price_change_pct;
        merged.snapshot_date = snap.snapshot_date;
      }
      return merged;
    });

    document.getElementById('stat-total').textContent    = DATA.length;
    document.getElementById('stat-traps').textContent    = DATA.filter(r => r.prism_verdict === 'Narrative Trap').length;
    document.getElementById('stat-breaking').textContent = DATA.filter(r => r.narrative_state === 'Breaking').length;

    // Build sector dropdown — use DB values first, fall back to embedded sector map
    const dbSectors = [...new Set(DATA.map(r => r.sector_name).filter(Boolean))].sort();
    // Embedded ticker→sector from sector intelligence data
    const SECTOR_MAP = {"PLTR":["Agentic AI / Autonomous Systems","Cybersecurity","Defense Technology","Predictive Analytics & Narrative Intelligence"],"TSLA":["Agentic AI / Autonomous Systems","Electric Vehicles & Autonomous Transport"],"GOOGL":["Agentic AI / Autonomous Systems","Cloud Computing","Quantum Computing","Social Media & Digital Advertising"],"MSFT":["Agentic AI / Autonomous Systems","Cloud Computing","Quantum Computing"],"AMZN":["Agentic AI / Autonomous Systems","Cloud Computing"],"NVDA":["AI Infrastructure","Agentic AI / Autonomous Systems","Semiconductors"],"AMD":["AI Infrastructure","Semiconductors"],"SMCI":["AI Infrastructure","Semiconductors"],"ARM":["AI Infrastructure","Semiconductors"],"AVGO":["AI Infrastructure","Semiconductors"],"TSM":["AI Infrastructure","Semiconductors"],"AMAT":["AI Infrastructure","Semiconductors"],"LRCX":["AI Infrastructure","Semiconductors"],"MU":["AI Infrastructure","Semiconductors"],"ORCL":["Cloud Computing"],"CRM":["Cloud Computing","Predictive Analytics & Narrative Intelligence"],"NOW":["Cloud Computing"],"WDAY":["Cloud Computing"],"INTU":["Cloud Computing","Predictive Analytics & Narrative Intelligence"],"PANW":["Cybersecurity"],"CRWD":["Cybersecurity"],"RDDT":["Data Licensing & AI Training Data","Social Media & Digital Advertising"],"SPOT":["Data Licensing & AI Training Data","Social Media & Digital Advertising"],"SNAP":["Data Licensing & AI Training Data","Social Media & Digital Advertising"],"SONY":["Data Licensing & AI Training Data"],"LMT":["Defense Technology"],"RTX":["Defense Technology"],"BA":["Defense Technology"],"RIVN":["Electric Vehicles & Autonomous Transport"],"LCID":["Electric Vehicles & Autonomous Transport"],"NIO":["Electric Vehicles & Autonomous Transport"],"GM":["Electric Vehicles & Autonomous Transport"],"F":["Electric Vehicles & Autonomous Transport"],"TM":["Electric Vehicles & Autonomous Transport"],"HMC":["Electric Vehicles & Autonomous Transport"],"DUK":["Energy Infrastructure / Power Grid"],"SO":["Energy Infrastructure / Power Grid"],"NEE":["Energy Infrastructure / Power Grid"],"VST":["Energy Infrastructure / Power Grid"],"CEG":["Energy Infrastructure / Power Grid"],"PWR":["Energy Infrastructure / Power Grid"],"V":["Fintech & Digital Payments"],"MA":["Fintech & Digital Payments"],"PYPL":["Fintech & Digital Payments"],"HOOD":["Fintech & Digital Payments"],"SOFI":["Fintech & Digital Payments"],"COIN":["Fintech & Digital Payments"],"JPM":["Fintech & Digital Payments"],"GS":["Fintech & Digital Payments"],"WFC":["Fintech & Digital Payments"],"MS":["Fintech & Digital Payments"],"BAC":["Fintech & Digital Payments"],"LLY":["Healthcare Technology & Biotech"],"JNJ":["Healthcare Technology & Biotech"],"MRK":["Healthcare Technology & Biotech"],"PFE":["Healthcare Technology & Biotech"],"ABBV":["Healthcare Technology & Biotech"],"ABT":["Healthcare Technology & Biotech"],"TMO":["Healthcare Technology & Biotech"],"DHR":["Healthcare Technology & Biotech"],"SNPS":["Predictive Analytics & Narrative Intelligence"],"CDNS":["Predictive Analytics & Narrative Intelligence"],"IBM":["Quantum Computing"],"PLD":["Real Estate & PropTech"],"AMT":["Real Estate & PropTech"],"OPEN":["Real Estate & PropTech"],"INTC":["Semiconductors"],"QCOM":["Semiconductors"],"MRVL":["Semiconductors"],"TXN":["Semiconductors"],"META":["Social Media & Digital Advertising"],"CMCSA":["Social Media & Digital Advertising"],"DIS":["Social Media & Digital Advertising"]};
    // Merge: DB sectors + any sectors derivable from ticker lookup
    const allSectorSet = new Set(dbSectors);
    DATA.forEach(r => {
      const mapped = SECTOR_MAP[r.ticker];
      if (mapped) mapped.forEach(s => allSectorSet.add(s));
    });
    // Also attach sector to rows missing sector_name
    DATA = DATA.map(r => {
      if (!r.sector_name && SECTOR_MAP[r.ticker]) {
        return { ...r, sector_name: SECTOR_MAP[r.ticker][0] };
      }
      return r;
    });
    const allSectors = [...allSectorSet].sort();
    const sectorSel = document.getElementById('sector-select');
    allSectors.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sectorSel.appendChild(opt);
    });

    render();

  } catch (err) {
    feed.innerHTML = `<div class="empty-state" style="padding:48px 0; color:#FF6B6B;">
      Failed to load data: ${err.message}<br>
      <small>Check your Supabase URL and anon key in Vercel environment variables.</small>
    </div>`;
    console.error(err);
  }
}

const PAGE_SIZE = 25;
let activeState   = 'all';
let activeVerdict = null;
let activeSector  = '';
let activeSort    = 'default';
let searchVal     = '';
let showing       = PAGE_SIZE;

function stateClass(s) {
  return { Breaking: 'badge-breaking', Surging: 'badge-surging', Fragile: 'badge-fragile', Stable: 'badge-stable' }[s] || 'badge-stable';
}
function pipClass(v) {
  if (v === 'Narrative Trap') return 'pip-trap';
  if (v === 'Structurally Supported') return 'pip-supported';
  return 'pip-monitoring';
}
function fmtPrice(p) { return p >= 100 ? p.toFixed(2) : p.toFixed(3); }
function fmtDelta(d) {
  if (d == null || d === 0) return { cls: 'delta-flat', txt: '—' };
  return { cls: d > 0 ? 'delta-pos' : 'delta-neg', txt: (d > 0 ? '+' : '') + d.toFixed(2) + '%' };
}
function esc(s) {
  return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

// Compute fair value divergence pct (negative = undervalued, positive = overvalued)
function fvdPct(r) {
  if (r.price == null || r.fair_value == null || r.fair_value === 0) return null;
  return ((r.price - r.fair_value) / r.fair_value) * 100;
}

function getFiltered() {
  let filtered = DATA.filter(r => {
    if (activeState !== 'all' && r.narrative_state !== activeState) return false;
    if (activeVerdict && r.prism_verdict !== activeVerdict) return false;
    if (activeSector && r.sector_name !== activeSector) return false;
    if (searchVal && !r.ticker.toLowerCase().includes(searchVal.toLowerCase())) return false;
    return true;
  });

  // Sort
  if (activeSort === 'undervalued') {
    // Most undervalued first: lowest (most negative) fvd %
    filtered = [...filtered].sort((a, b) => {
      const fa = fvdPct(a) ?? Infinity;
      const fb = fvdPct(b) ?? Infinity;
      return fa - fb;
    });
  } else if (activeSort === 'overvalued') {
    // Most overvalued first: highest (most positive) fvd %
    filtered = [...filtered].sort((a, b) => {
      const fa = fvdPct(a) ?? -Infinity;
      const fb = fvdPct(b) ?? -Infinity;
      return fb - fa;
    });
  }
  // default = ticker.asc (already sorted from API)

  return filtered;
}

function render() {
  const filtered = getFiltered();
  const slice = filtered.slice(0, showing);
  const feed = document.getElementById('feed');
  const countLine = document.getElementById('count-line');
  const lmWrap = document.getElementById('load-more-wrap');

  countLine.textContent = filtered.length + ' ticker' + (filtered.length === 1 ? '' : 's');

  if (filtered.length === 0) {
    feed.innerHTML = '<div class="empty-state">No stories match the current filter.</div>';
    lmWrap.style.display = 'none';
    return;
  }

  feed.innerHTML = slice.map(r => {
    const delta = fmtDelta(r.price_change_pct);

    // Verdict badge using prism_verdict
    const verdictTag = r.prism_verdict === 'Narrative Trap'
      ? '<span class="verdict-tag verdict-trap">Narrative Trap</span>'
      : r.prism_verdict === 'Structurally Supported'
      ? '<span class="verdict-tag verdict-supported">Structurally Supported</span>'
      : '';

    // Narrative trend indicator
    const trendIcon = r.narrative_trend === 'Rising' ? '↑'
      : r.narrative_trend === 'Collapsing' ? '↓'
      : r.narrative_trend === 'Stable' ? '→' : '';
    const trendCls = r.narrative_trend === 'Rising' ? 'trend-up'
      : r.narrative_trend === 'Collapsing' ? 'trend-down' : 'trend-flat';

    // Fundamentals — only show if present
    const peTag = r.pe_ratio != null
      ? `<span class="meta-tag">P/E <strong>${r.pe_ratio.toFixed(1)}x</strong></span>` : '';
    const earningsTag = r.days_to_earnings != null
      ? `<span class="meta-tag">Earnings <strong>${r.days_to_earnings}d</strong></span>` : '';
    const guidanceTag = r.guidance_direction && r.guidance_direction !== 'Neutral'
      ? `<span class="meta-tag">Guidance <strong>${esc(r.guidance_direction)}</strong></span>` : '';

    // Fair value divergence
    const fvd = fvdPct(r);
    const fvdTag = fvd != null
      ? `<span class="meta-tag fvd-tag ${fvd < 0 ? 'fvd-under' : 'fvd-over'}">${fvd < 0 ? '▼' : '▲'} <strong>${Math.abs(fvd).toFixed(0)}% ${fvd < 0 ? 'undervalued' : 'overvalued'}</strong></span>`
      : '';

    // Sector tag — only show when sector filter is not active (would be redundant)
    const sectorTag = r.sector_name && !activeSector
      ? `<span class="meta-sector">${esc(r.sector_name)}</span>` : '';

    return `<a class="story-card" href="/ticker/${encodeURIComponent(r.ticker)}">
      <div class="card-top">
        <div class="card-left">
          <span class="ticker-badge ${stateClass(r.narrative_state)}">${r.ticker}</span>
          <span class="verdict-pip ${pipClass(r.prism_verdict)}" title="${esc(r.prism_verdict)}"></span>
          <span class="story-claim">${esc(r.story_claim)}</span>
        </div>
        <div class="price-block">
          <div class="price-nums">
            <div class="price-main">$${fmtPrice(r.price)}</div>
            <div class="price-delta ${delta.cls}">${delta.txt}</div>
          </div>
          <span class="card-arrow">›</span>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-tag">Driver: <strong>${esc(r.primary_driver)}</strong></span>
        ${peTag}
        ${earningsTag}
        ${guidanceTag}
        ${r.institutional_positioning && r.institutional_positioning !== 'Neutral' ? `<span class="meta-tag">Inst: <strong>${esc(r.institutional_positioning)}</strong></span>` : ''}
        ${trendIcon ? `<span class="meta-tag ${trendCls}">${trendIcon} <strong>${esc(r.narrative_trend)}</strong></span>` : ''}
        ${fvdTag}
        ${verdictTag}
        ${sectorTag}
        ${r.snapshot_date ? `<span class="meta-date">${new Date(r.snapshot_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>` : ''}
      </div>
    </a>`;
  }).join('');

  lmWrap.style.display = showing < filtered.length ? 'block' : 'none';
}

// Filter chips
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const filter = chip.dataset.filter;
    const val = chip.dataset.val;

    if (filter === 'state') {
      activeState = val;
      document.querySelectorAll('[data-filter="state"]').forEach(c => {
        c.classList.remove('active', 'active-breaking', 'active-surging', 'active-fragile', 'active-stable');
        if (c.dataset.val === val) {
          const cls = val === 'Breaking' ? 'active-breaking'
            : val === 'Surging' ? 'active-surging'
            : val === 'Fragile' ? 'active-fragile'
            : val === 'Stable' ? 'active-stable'
            : 'active';
          c.classList.add(cls);
        }
      });
    } else if (filter === 'verdict') {
      if (activeVerdict === val) {
        activeVerdict = null;
        chip.classList.remove('active');
      } else {
        activeVerdict = val;
        document.querySelectorAll('[data-filter="verdict"]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      }
    }
    showing = PAGE_SIZE;
    render();
  });
});

document.getElementById('sector-select').addEventListener('change', e => {
  activeSector = e.target.value;
  showing = PAGE_SIZE;
  render();
});

// Value / Sort buttons
document.querySelectorAll('[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.sort;
    if (activeSort === val) {
      // Toggle off — back to default
      activeSort = 'default';
      document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active', 'active-surging', 'active-breaking'));
      document.querySelector('[data-sort="default"]').classList.add('active');
    } else {
      activeSort = val;
      document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active', 'active-surging', 'active-breaking'));
      btn.classList.add(val === 'undervalued' ? 'active-surging' : val === 'overvalued' ? 'active-breaking' : 'active');
    }
    showing = PAGE_SIZE;
    render();
  });
});
// Set A→Z as default active on load
document.querySelector('[data-sort="default"]')?.classList.add('active');

document.getElementById('ticker-search').addEventListener('input', e => {
  searchVal = e.target.value;
  showing = PAGE_SIZE;
  render();
});

document.getElementById('load-more-btn').addEventListener('click', () => {
  showing += PAGE_SIZE;
  render();
});

loadData();

// Auto-refresh every 5 minutes
setInterval(() => loadData(), 5 * 60 * 1000);

// Refresh when user tabs back to the page
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) loadData();
});
</script>
</body>
