<html lang="en" data-theme="dark">
<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Instrument+Serif:ital@0;1&family=Anton&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════════════════════
   DASHBOARD V2 — Clean modular CSS
   Each section has clearly labeled blocks. Edit one without breaking others.
   ══════════════════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{opacity:0;transition:opacity 0.2s;}

/* ── DESIGN TOKENS ─────────────────────────────────────────────────────────── */
:root{
  --font-display: 'Instrument Serif', 'DM Serif Display', Georgia, serif;
  --font-body: 'Inter', 'DM Sans', system-ui, sans-serif;
  --font-cmd: 'Anton', Impact, sans-serif;
}
/* Light mode (default for :root) */
:root{
  --mp-obsidian:#FFFFFF; --mp-deep:#FFFFFF; --mp-surface:#FAFBFC;
  --mp-surface2:#F0F2F5; --mp-border:rgba(0,0,0,0.08);
  --mp-border-hover:rgba(0,0,0,0.15);
  --mp-text-primary:#1A1F2E; --mp-text-secondary:rgba(0,0,0,0.65);
  --mp-text-tertiary:#6B7280; --mp-text-muted:rgba(0,0,0,0.35);
  --mp-cyan:#00AEFF; --mp-teal:#38C8B8; --mp-green:#00DE94;
  --mp-red:#FF4D4D; --mp-amber:#FFB800; --mp-violet:#7B61FF;
  --mp-card-shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
}
[data-theme="dark"]{
  --mp-obsidian:#080B11; --mp-deep:#0A0D14; --mp-surface:#0C1018;
  --mp-surface2:#111927; --mp-border:rgba(255,255,255,0.06);
  --mp-border-hover:rgba(255,255,255,0.14);
  --mp-text-primary:#FFFFFF; --mp-text-secondary:rgba(255,255,255,0.7);
  --mp-text-tertiary:#A0A8B0; --mp-text-muted:rgba(255,255,255,0.3);
  --mp-card-shadow:0 4px 12px rgba(0,0,0,0.4);
}

/* ── LAYOUT ────────────────────────────────────────────────────────────────── */
body{font-family:var(--font-body);background:var(--mp-obsidian);color:var(--mp-text-primary);min-height:100vh;display:flex;}
.side-nav{
  width:248px;height:100vh;position:fixed;top:0;left:0;z-index:50;
  background:var(--mp-surface);border-right:1px solid var(--mp-border);
  display:flex;flex-direction:column;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.05) transparent;
}
.side-nav::-webkit-scrollbar{width:4px;}.side-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:4px;}
.nav-logo{display:block;padding:20px 20px 16px;text-decoration:none;}
.nav-logo-img{height:28px;width:auto;display:block;}
.logo-dark{display:none;}[data-theme="dark"] .logo-light{display:none;}[data-theme="dark"] .logo-dark{display:block;}
.nav-items{flex:1;padding:0 12px;}
.nav-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--mp-text-muted);padding:16px 12px 6px;font-family:var(--font-body);}
.nav-item{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:8px 12px;border-radius:8px;border:none;background:none;
  font-family:var(--font-body);font-size:13px;font-weight:500;
  color:var(--mp-text-secondary);cursor:pointer;transition:all .15s;
  text-align:left;position:relative;
}
.nav-item:hover{background:var(--mp-surface2);color:var(--mp-text-primary);}
.nav-item.active{background:var(--mp-cyan);color:#fff;}
.nav-item.active:hover{background:var(--mp-cyan);}
.nav-item svg{width:18px;height:18px;flex-shrink:0;}
.nav-item-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-left:auto;background:rgba(0,174,255,0.15);color:#00AEFF;border:1px solid rgba(0,174,255,0.2);}
.nav-item-badge.teal{background:rgba(0,222,148,0.1);color:#00DE94;border-color:rgba(0,222,148,0.2);}
.nav-bottom{padding:12px;border-top:1px solid var(--mp-border);margin-top:auto;}
.nav-bottom a,.nav-bottom button{display:block;width:100%;text-align:left;font-size:12px;color:var(--mp-text-tertiary);text-decoration:none;padding:6px 12px;border:none;background:none;cursor:pointer;font-family:var(--font-body);}
.nav-bottom a:hover,.nav-bottom button:hover{color:var(--mp-text-primary);}

.main{margin-left:248px;flex:1;min-height:100vh;position:relative;}
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px;background:var(--mp-obsidian);border-bottom:1px solid var(--mp-border);
  backdrop-filter:blur(12px);
}
.topbar-title{font-family:var(--font-body);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mp-text-muted);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-date{font-size:12px;color:var(--mp-text-tertiary);}
.page-content{padding:24px 28px 64px;position:relative;z-index:2;}

/* Tab panels */
.tk-tab-panel{display:none;}
.tk-tab-panel.active{display:block;}

/* ── SECTIONS ──────────────────────────────────────────────────────────────── */
.section{
  background:var(--mp-surface);border:1px solid var(--mp-border);border-radius:16px;
  overflow:hidden;margin-bottom:16px;
  box-shadow:var(--mp-card-shadow);
}
.section-label{
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--mp-text-muted);padding:14px 20px;border-bottom:1px solid var(--mp-border);
  font-family:var(--font-body);
}

/* ── HERO BANNER ───────────────────────────────────────────────────────────── */
.daily-hero-banner{
  background:var(--mp-surface);border:1px solid var(--mp-border);border-radius:16px;
  box-shadow:var(--mp-card-shadow);overflow:hidden;margin-bottom:16px;
}
.dhb-inner{padding:32px 36px;}
.dhb-dateline{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#00AEFF;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.dhb-dateline .sep{color:var(--mp-text-muted);}
.dhb-h{font-family:var(--font-body);font-size:clamp(28px,3vw,42px);font-weight:700;letter-spacing:-.025em;line-height:1.1;}
.dhb-h em{font-style:italic;display:block;font-size:clamp(32px,3.8vw,50px);color:#00AEFF;font-family:var(--font-display);}

/* ── MARKET WEATHER BANNER ─────────────────────────────────────────────────── */
.mw-banner{
  display:flex;align-items:stretch;gap:1px;
  background:var(--mp-border);border:1px solid var(--mp-border);border-radius:12px;
  overflow:hidden;margin-bottom:16px;position:relative;
}
.mw-banner::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;z-index:2;}
.mw-banner.mw-choppy::after{background:linear-gradient(90deg,#FFB800,#FF8C00,#FFB800);background-size:200% 100%;animation:mwPulse 3s ease infinite;}
.mw-banner.mw-trending::after{background:linear-gradient(90deg,#00DE94,#38C8B8);}
.mw-banner.mw-crisis::after{background:linear-gradient(90deg,#FF4D4D,#FF0000);animation:mwPulse 1.5s ease infinite;}
.mw-banner.mw-recovery::after{background:linear-gradient(90deg,#00AEFF,#38C8B8);}
@keyframes mwPulse{0%,100%{opacity:1}50%{opacity:0.5}}
.mw-cell{flex:1;padding:14px 18px;background:var(--mp-surface);display:flex;flex-direction:column;gap:4px;min-width:0;}
.mw-cell:first-child{border-radius:12px 0 0 12px;}.mw-cell:last-child{border-radius:0 12px 12px 0;}
.mw-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mp-text-muted);font-family:var(--font-body);white-space:nowrap;}
.mw-val{font-size:18px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);white-space:nowrap;display:flex;align-items:center;gap:8px;}
.mw-icon{font-size:20px;flex-shrink:0;}
.mw-sub{font-size:11px;color:var(--mp-text-tertiary);}
.mw-val.regime-choppy{color:#FFB800;}.mw-val.regime-trending{color:#00DE94;}.mw-val.regime-crisis{color:#FF4D4D;}.mw-val.regime-recovery{color:#00AEFF;}
.mw-heatmap{display:flex;align-items:stretch;height:28px;border-radius:6px;overflow:hidden;background:var(--mp-surface2);margin-top:4px;}
.mw-hm-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;font-family:var(--font-body);color:rgba(255,255,255,0.85);transition:flex .3s;}

/* ── DAILY CONVICTION CARDS ────────────────────────────────────────────────── */
.dc-section{margin-bottom:20px;}
.dc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px;flex-wrap:wrap;gap:8px;}
.dc-title{font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--mp-text-primary);display:flex;align-items:center;gap:8px;}
.dc-subtitle{font-size:12px;color:var(--mp-text-muted);}
.dc-row-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mp-text-muted);margin:16px 0 8px 2px;font-family:var(--font-body);display:flex;align-items:center;gap:6px;}
.dc-row-label .dc-row-icon{font-size:14px;}
.dc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.dc-card{
  background:var(--mp-surface);border:1px solid var(--mp-border);border-radius:14px;
  padding:18px 20px;position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s,transform .2s;cursor:pointer;
}
.dc-card:hover{border-color:var(--mp-border-hover);box-shadow:0 8px 24px rgba(0,0,0,0.4);transform:translateY(-2px);}
.dc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.dc-card.dc-safe::before{background:linear-gradient(90deg,#00DE94,#38C8B8);}
.dc-card.dc-avoid::before{background:linear-gradient(90deg,#FF4D4D,#FFB800);}
.dc-card.dc-monitor::before{background:linear-gradient(90deg,#00AEFF,#7B61FF);}
.dc-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dc-card-ticker{font-size:20px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);}
.dc-card-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:5px;font-family:var(--font-body);}
.dc-card-badge.safe{background:rgba(0,222,148,0.1);color:#00DE94;border:1px solid rgba(0,222,148,0.2);}
.dc-card-badge.avoid{background:rgba(255,77,77,0.1);color:#FF4D4D;border:1px solid rgba(255,77,77,0.2);}
.dc-card-badge.monitor{background:rgba(0,174,255,0.1);color:#00AEFF;border:1px solid rgba(0,174,255,0.2);}
.dc-card-conf{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dc-conf-bar{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
.dc-conf-fill{height:100%;border-radius:3px;}
.dc-conf-pct{font-size:13px;font-weight:700;font-family:var(--font-body);min-width:36px;text-align:right;}
.dc-card-signals{display:flex;align-items:center;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.dc-signal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dc-signal-dot.on{background:#00DE94;}
.dc-signal-dot.off{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);}
.dc-signal-label{font-size:11px;color:var(--mp-text-muted);margin-left:4px;font-family:var(--font-body);white-space:nowrap;}
.dc-card-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.dc-chip{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px;font-family:var(--font-body);background:rgba(255,255,255,0.04);border:1px solid var(--mp-border);color:var(--mp-text-tertiary);white-space:nowrap;}
.dc-card-reason{font-size:13px;color:var(--mp-text-secondary);line-height:1.65;}

/* ── LOGO ──────────────────────────────────────────────────────────────────── */
.t-logo{width:28px;height:28px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.t-logo.sm{width:24px;height:24px;border-radius:5px;font-size:10px;}
.t-logo img{width:100%;height:100%;object-fit:contain;}

/* ── RESPONSIVE ────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  .side-nav{display:none;}
  .main{margin-left:0;}
  .topbar{padding:12px 16px;}
  .page-content{padding:16px 12px 48px;}
  .mw-banner{flex-wrap:wrap;}.mw-cell{flex:1 1 45%;min-width:100px;}
  .dc-grid{grid-template-columns:1fr;}
}

/* ── TRADE LANES ("What's the Play?") ──────────────────────────────────────── */
.tl-section{margin-bottom:20px;}
.tl-header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.tl-title{font-family:var(--font-display);font-size:24px;font-weight:400;color:var(--mp-text-primary);}
.tl-title-sub{font-size:13px;color:var(--mp-text-tertiary);font-style:italic;}
.tl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;align-items:start;}
.tl-lane{background:var(--mp-surface);border:1px solid var(--mp-border);border-radius:14px;overflow:hidden;box-shadow:var(--mp-card-shadow);}
.tl-lane-header{display:flex;align-items:center;gap:12px;padding:14px 18px;}
.tl-lane-icon{font-size:22px;}
.tl-lane-title{font-size:15px;font-weight:700;font-family:var(--font-body);}
.tl-lane-sub{font-size:11px;color:var(--mp-text-muted);margin-top:1px;}
.tl-lane-cards{padding:8px;display:flex;flex-direction:column;gap:8px;}
.tl-card{
  background:var(--mp-surface2);border:1px solid var(--mp-border);border-radius:10px;
  padding:12px 14px;cursor:pointer;transition:all .15s;
}
.tl-card:hover{border-color:var(--mp-border-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.tl-card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.tl-card-left{display:flex;align-items:center;gap:8px;}
.tl-ticker{font-size:15px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);}
.tl-price{font-size:12px;color:var(--mp-text-tertiary);margin-left:6px;}
.tl-card-right{display:flex;align-items:center;gap:6px;}
.tl-dir{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-body);}
.tl-tier{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;font-family:var(--font-body);letter-spacing:.04em;}
.tl-platinum{background:rgba(0,174,255,0.1);color:#00AEFF;border:1px solid rgba(0,174,255,0.2);}
.tl-gold{background:rgba(255,184,0,0.1);color:#FFB800;border:1px solid rgba(255,184,0,0.2);}
.tl-surprise{background:rgba(123,97,255,0.1);color:#B97CFF;border:1px solid rgba(123,97,255,0.2);}
.tl-action{font-size:14px;font-weight:700;font-family:var(--font-body);margin-bottom:2px;}
.tl-verb{font-size:12px;color:var(--mp-text-secondary);margin-bottom:8px;line-height:1.5;}
.tl-card-footer{display:flex;align-items:center;gap:10px;}
.tl-conf-wrap{display:flex;align-items:center;gap:6px;flex:1;}
.tl-conf-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.tl-conf-fill{height:100%;border-radius:2px;}
.tl-conf-pct{font-size:11px;font-weight:700;font-family:var(--font-body);}
.tl-days{font-size:11px;color:var(--mp-text-muted);font-family:var(--font-body);white-space:nowrap;}
.tl-overflow{display:flex;flex-direction:column;gap:8px;}
.tl-view-more{
  width:100%;padding:10px;border-radius:8px;border:1px dashed var(--mp-border);
  background:none;color:var(--mp-text-muted);font-size:12px;font-weight:600;
  font-family:var(--font-body);cursor:pointer;transition:all .15s;margin-top:4px;
  letter-spacing:.03em;
}
.tl-view-more:hover{background:rgba(255,255,255,0.03);border-style:solid;}
@media(max-width:768px){.tl-grid{grid-template-columns:1fr;}}

/* ── MARKET HEATMAP ─────────────────────────────────────────────────────────── */
.mm-section{margin-bottom:20px;}
.mm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px;flex-wrap:wrap;gap:8px;}
.mm-title{font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--mp-text-primary);display:flex;align-items:center;gap:8px;}
.mm-legend{display:flex;gap:16px;font-size:12px;font-family:var(--font-body);}
.mm-wrap{
  position:relative;background:var(--mp-surface);border:1px solid var(--mp-border);
  border-radius:16px;overflow:hidden;box-shadow:var(--mp-card-shadow);padding:16px;
}
/* Heatmap grid */
.hm-grid{display:flex;flex-wrap:wrap;gap:16px;}
.hm-sector{flex:1;min-width:200px;}
.hm-sector-label{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  font-family:var(--font-body);padding-bottom:6px;margin-bottom:8px;
  border-bottom:2px solid;display:flex;align-items:center;gap:6px;
}
.hm-sector-count{font-size:10px;font-weight:400;color:var(--mp-text-muted);}
.hm-sector-cells{display:flex;flex-wrap:wrap;gap:6px;}
.hm-cell{
  width:72px;height:72px;border-radius:10px;border:1px solid;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;
}
.hm-cell:hover{transform:scale(1.08);box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:2;}
.hm-cell-logo-wrap{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.hm-cell-logo{width:24px;height:24px;object-fit:contain;border-radius:4px;}
.hm-cell-initials{font-size:11px;font-weight:700;}
.hm-cell-ticker{font-size:10px;font-weight:700;color:#fff;font-family:var(--font-body);line-height:1;}
.hm-cell-conf{font-size:9px;font-weight:600;font-family:var(--font-body);line-height:1;}
.hm-tier{position:absolute;top:3px;right:4px;font-size:8px;opacity:0.7;}
.hm-plat{color:#00AEFF;}.hm-gold{color:#FFB800;}.hm-surp{color:#B97CFF;}
/* Detail panel */
.hm-detail{
  position:absolute;top:16px;right:16px;width:300px;max-width:90%;
  background:var(--mp-surface2);border:1px solid var(--mp-border-hover);
  border-radius:14px;padding:20px;box-shadow:0 12px 40px rgba(0,0,0,0.5);
  z-index:10;animation:fadeUp .25s ease both;
}
.hm-detail-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--mp-text-muted);font-size:20px;cursor:pointer;line-height:1;}
.hm-detail-close:hover{color:var(--mp-text-primary);}
.hm-detail-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.hm-detail-ticker{font-size:22px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);}
.hm-detail-dir{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.hm-detail-sector{font-size:12px;color:var(--mp-text-tertiary);margin-bottom:8px;}
.hm-detail-desc{font-size:13px;color:var(--mp-text-secondary);line-height:1.6;margin-bottom:12px;}
.hm-detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.hm-stat{background:rgba(255,255,255,0.03);border:1px solid var(--mp-border);border-radius:8px;padding:8px 10px;}
.hm-stat-l{font-size:10px;color:var(--mp-text-muted);text-transform:uppercase;letter-spacing:.05em;display:block;font-family:var(--font-body);}
.hm-stat-v{font-size:16px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);}
.hm-detail-link{
  display:block;text-align:center;padding:10px;border-radius:8px;
  background:rgba(0,174,255,0.08);border:1px solid rgba(0,174,255,0.2);
  color:var(--mp-cyan);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;
}
.hm-detail-link:hover{background:rgba(0,174,255,0.15);}
.hm-detail-action{font-family:var(--font-body);}
@media(max-width:600px){.hm-cell{width:60px;height:60px;}.hm-sector{min-width:140px;}}

/* ── TRADING CARDS v2 ──────────────────────────────────────────────────────── */
.tcv2-page-header{margin-bottom:20px;}
.tcv2-page-title{font-family:var(--font-body);font-size:22px;font-weight:700;color:var(--mp-text-primary);margin-bottom:4px;}
.tcv2-page-sub{font-size:13px;color:var(--mp-text-tertiary);}
.tcv2-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.tcv2-chip{
  padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;
  border:1px solid var(--mp-border);color:var(--mp-text-secondary);
  background:transparent;cursor:pointer;transition:all .15s;font-family:var(--font-body);
}
.tcv2-chip:hover{border-color:var(--mp-cyan);color:var(--mp-cyan);}
.tcv2-chip.active{border-color:var(--mp-cyan);color:#fff;background:var(--mp-cyan);}
.tcv2-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding-bottom:24px;}

/* Card */
.tcv2-card{
  background:var(--mp-surface);border:1px solid var(--mp-border);border-radius:16px;
  overflow:hidden;cursor:pointer;position:relative;
  transition:transform .25s cubic-bezier(.2,1,.3,1),box-shadow .25s;
  animation:tcv2Enter .4s cubic-bezier(.2,1,.3,1) both;
}
@keyframes tcv2Enter{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.tcv2-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,0.25);}
.tcv2-card:hover .tcv2-shimmer{opacity:1;}

/* Shimmer — gamified hover glow */
.tcv2-shimmer{
  position:absolute;inset:0;pointer-events:none;z-index:1;border-radius:inherit;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.04) 45%,transparent 55%);
  background-size:250% 100%;opacity:0;transition:opacity .3s;
}
.tcv2-card:hover .tcv2-shimmer{animation:tcv2Shine 1.5s ease;}
@keyframes tcv2Shine{0%{background-position:250% 0;opacity:1;}100%{background-position:-250% 0;opacity:0;}}

/* Accent bar — only real color on the card */
.tcv2-accent{height:3px;width:100%;}

/* Body */
.tcv2-body{padding:16px 18px 12px;position:relative;z-index:2;}

/* Row 1: Logo + identity + tier */
.tcv2-row1{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.tcv2-logo-wrap{flex-shrink:0;}
.tcv2-logo{width:40px;height:40px;border-radius:10px;object-fit:contain;background:var(--mp-surface2);padding:4px;}
.tcv2-logo-fb{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:var(--mp-surface2);color:var(--mp-text-tertiary);}
.tcv2-identity{flex:1;min-width:0;}
.tcv2-ticker{font-size:18px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);letter-spacing:.01em;}
.tcv2-sector{font-size:11px;color:var(--mp-text-muted);margin-top:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tcv2-tier{font-size:10px;font-weight:600;padding:4px 10px;border-radius:6px;letter-spacing:.04em;white-space:nowrap;font-family:var(--font-body);background:rgba(0,174,255,0.08);color:var(--mp-cyan);border:1px solid rgba(0,174,255,0.15);}
.tcv2-tier-gold{background:rgba(255,184,0,0.08);color:#FFB800;border-color:rgba(255,184,0,0.15);}
.tcv2-tier-surp{background:rgba(123,97,255,0.08);color:#B97CFF;border-color:rgba(123,97,255,0.15);}

/* Row 2: Price + direction pill */
.tcv2-row2{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tcv2-price{font-size:20px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);}
.tcv2-dir-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;border:1px solid;font-family:var(--font-body);}

/* Row 3: Action — the "what to do" */
.tcv2-action{font-size:15px;font-weight:700;color:var(--mp-text-primary);font-family:var(--font-body);margin-bottom:10px;}

/* Row 4: Confidence bar */
.tcv2-conf-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tcv2-conf-label{font-size:11px;color:var(--mp-text-muted);font-family:var(--font-body);white-space:nowrap;}
.tcv2-conf-bar{flex:1;height:4px;background:var(--mp-surface2);border-radius:2px;overflow:hidden;}
.tcv2-conf-fill{height:100%;border-radius:2px;background:var(--mp-cyan);transition:width .8s cubic-bezier(.2,1,.3,1);}
.tcv2-conf-pct{font-size:12px;font-weight:700;color:var(--mp-text-tertiary);font-family:var(--font-body);min-width:30px;text-align:right;}

/* Row 5: Meta */
.tcv2-meta{display:flex;gap:12px;font-size:11px;color:var(--mp-text-muted);font-family:var(--font-body);margin-bottom:8px;}

/* Row 6: Description — subtle, last */
.tcv2-desc{
  font-size:12px;color:var(--mp-text-tertiary);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* Footer */
.tcv2-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--mp-border);}
.tcv2-status{font-size:11px;font-weight:500;color:var(--mp-text-muted);display:flex;align-items:center;gap:5px;font-family:var(--font-body);}
.tcv2-pulse{width:6px;height:6px;border-radius:50%;animation:tcv2Pulse 2s ease infinite;}
@keyframes tcv2Pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.tcv2-view{font-size:11px;color:var(--mp-cyan);font-weight:600;font-family:var(--font-body);transition:color .15s;}
.tcv2-card:hover .tcv2-view{color:#fff;}
@media(max-width:600px){.tcv2-grid{grid-template-columns:1fr;}}

/* ── ANIMATIONS ────────────────────────────────────────────────────────────── */
@keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>

<!-- Boot -->
<script>
(function(){
  // Date
  var dateEl = document.getElementById('daily-date-tag');
  if(dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var topDate = document.getElementById('topbar-date');
  if(topDate) topDate.textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

  // Theme toggle
  window.toggleTheme = function(){
    var t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    try{localStorage.setItem('mp-theme', t);}catch(e){}
  };

  // Boot: auth then load modules
  MP.ensureAuth().then(function(user){
    if(user){
      var userEl = document.getElementById('topbar-user');
      if(userEl){ userEl.textContent = user.email || ''; userEl.style.display = 'inline'; }
    }
    // Load Daily Brief modules
    MP.load('market-weather');
    MP.load('daily-conviction');
    MP.load('trade-lanes');
  });
})();
</script>
