<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker — Market Prism</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --card: #151924;
    --border: rgba(255,255,255,0.08);
    --text: #e6e8ef;
    --sub: #9aa3b2;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --blue: #3b82f6;
    /* Legacy mappings for sidebar */
    --mp-obsidian: #0f1117;
    --mp-deep: #0d1019;
    --mp-surface: #151924;
    --mp-border: rgba(255,255,255,0.08);
    --mp-border-mid: rgba(255,255,255,0.14);
    --mp-blue: #3b82f6;
    --mp-text-primary: #e6e8ef;
    --mp-text-secondary: #9aa3b2;
    --mp-text-tertiary: #4a5578;
    --font-display: Inter, sans-serif;
    --font-body: Inter, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', monospace;
  }

  html { font-size: 16px; }
  body {
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    font-weight: 400;
  }

  /* ── App Layout + Sidebar ── */
  .app-layout { display: flex; min-height: 100vh; }
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
    background: var(--mp-deep); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 24px 16px;
    z-index: 50;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display); font-size: 1.1rem; font-weight: 600;
    color: var(--text); margin-bottom: 32px;
    text-decoration: none;
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    font-size: 0.85rem; color: var(--sub);
    text-decoration: none; transition: all 0.15s;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active {
    background: rgba(59,130,246,0.1); color: var(--blue);
    border-left: 2px solid var(--blue);
  }
  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .sidebar-home-link {
    font-size: 0.8rem; color: var(--mp-text-tertiary);
    text-decoration: none; transition: color 0.15s;
  }
  .sidebar-home-link:hover { color: var(--text); }
  .main-content { margin-left: 240px; flex: 1; min-width: 0; }

  /* Mobile top bar */
  .mobile-topbar {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--mp-deep); border-bottom: 1px solid var(--border);
    align-items: center; padding: 0 16px; z-index: 60;
    gap: 12px;
  }
  .mobile-hamburger {
    background: none; border: none; color: var(--text);
    font-size: 22px; cursor: pointer; padding: 4px;
  }
  .mobile-topbar-title {
    font-family: var(--font-display); font-size: 1rem; font-weight: 600;
    color: var(--text);
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 49;
  }
  .sidebar-overlay.visible { display: block; }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
    .sidebar.open { transform: translateX(0); }
    .mobile-topbar { display: flex; }
    .main-content { margin-left: 0; padding-top: 52px; }
  }

  /* ── Page Container ── */
  .container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  /* ── Typography ── */
  .small {
    font-size: 12px;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .title {
    font-size: 28px;
    font-weight: 700;
  }
  .flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
  }
  ul {
    padding-left: 18px;
  }
  li {
    margin-bottom: 6px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
  }
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  /* ── Skeleton ── */
  .skel {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    animation: skel-pulse 1.4s ease-in-out infinite;
  }
  @keyframes skel-pulse { 0%,100% { opacity:1; } 50% { opacity:0.35; } }

  /* ── Breadcrumb ── */
  .site-nav {
    padding: 0 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--mp-text-tertiary);
  }
  .nav-back {
    color: var(--mp-text-tertiary);
    text-decoration: none;
    transition: color 0.12s;
  }
  .nav-back:hover { color: var(--text); }
  .nav-sep { color: var(--border); }
  .nav-ticker { color: var(--sub); font-size: 12px; font-weight: 500; }

  /* ── No-data fallback ── */
  .no-data {
    font-size: 14px;
    color: var(--sub);
    padding: 20px;
    text-align: center;
  }
  .inline-err {
    font-size: 13px;
    color: var(--red);
    padding: 12px;
  }

  /* ── Diagnostics grid ── */
  .diag-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .diag-grid > div {
    padding: 6px 0;
  }
  @media (max-width: 600px) {
    .diag-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Action bar ── */
  .action-bar {
    display: none;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 16px;
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: Inter, sans-serif;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--sub);
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .action-btn svg { width: 14px; height: 14px; }
  .action-btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .action-btn.primary:hover { opacity: 0.9; }

  .capture-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .capture-overlay.active { display: flex; }
  .capture-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<script>window.__env = { SUPABASE_URL: '', SUPABASE_ANON: '', TICKER: '' };</script>

  <!-- Primary Narrative -->

<script>
// ── Mobile sidebar toggle ────────────────────────────────────────────────────
(function() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const hamburger = document.getElementById('mobile-hamburger');
  function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('visible'); }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }
  hamburger.addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);
})();
</script>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = window.__env?.SUPABASE_URL  || '';
const SUPABASE_ANON = window.__env?.SUPABASE_ANON || '';

if (!SUPABASE_URL || !SUPABASE_ANON) {
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('hero-card');
    if (el) el.innerHTML = '<div class="card"><div class="inline-err">Config error: SUPABASE_URL or SUPABASE_ANON not set.</div></div>';
  });
  throw new Error('Missing Supabase config');
}

// Extract ticker from URL path: /ticker/NVDA
const pathParts = location.pathname.split('/').filter(Boolean);
const TICKER = (
  window.__env?.TICKER ||
  new URLSearchParams(location.search).get('t') ||
  decodeURIComponent(pathParts[pathParts.length - 1] || '')
).toUpperCase().replace(/[^A-Z0-9.\-]/g, '');

if (!TICKER) {
  document.getElementById('hero-card').innerHTML = '<div class="card"><div class="no-data">No ticker specified in URL.</div></div>';
}

document.title = TICKER ? `${TICKER} — Market Prism` : 'Market Prism';
document.getElementById('nav-ticker').textContent = TICKER;

// ── Supabase helper ──────────────────────────────────────────────────────────
async function sbFetch(table, params) {
  const qs = Object.entries(params)
    .filter(([,v]) => v !== undefined && v !== null && v !== '')
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
    .join('&');
  const url = `${SUPABASE_URL}/rest/v1/${table}?${qs}`;
  const res = await fetch(url, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Accept': 'application/json'
    }
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`[${table}] ${res.status}: ${body.slice(0, 200)}`);
  }
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error(`[${table}] JSON parse failed. Response starts with: ${text.slice(0, 120)}`);
  }
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return s ? String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}

// ── Derived metrics ─────────────────────────────────────────────────────────

function fragility(p) {
  if (!p) return null;
  const coord   = p.worst_coordination ?? 0;
  const invHlth = 100 - (p.pulse_health_score ?? 50);
  const drift   = Math.min(100, Math.abs(p.pulse_drift ?? 0));
  return Math.round(coord * 0.35 + invHlth * 0.35 + drift * 0.30);
}

function deriveDirection(p, hero) {
  // Determine SHORT or LONG from available data
  if (!p && !hero) return { dir: 'NEUTRAL', isBear: false };
  const drift = p?.pulse_drift ?? 0;
  const sentiment = p?.net_sentiment ?? 0;
  const forecast = (p?.direction_forecast || '').toUpperCase();
  const verdict = (p?.prevailing_verdict || hero?.prism_verdict || '').toLowerCase();

  // Strong signals
  if (forecast.includes('DOWN') || forecast.includes('BEAR')) return { dir: 'SHORT', isBear: true };
  if (forecast.includes('UP') || forecast.includes('BULL')) return { dir: 'LONG', isBear: false };
  if (verdict.includes('trap')) return { dir: 'SHORT', isBear: true };
  if (verdict.includes('supported')) return { dir: 'LONG', isBear: false };

  // Derived from drift/sentiment
  if (drift < -10 || sentiment < -15) return { dir: 'SHORT', isBear: true };
  if (drift > 10 || sentiment > 15) return { dir: 'LONG', isBear: false };

  return { dir: 'NEUTRAL', isBear: false };
}

function deriveConfidence(p) {
  if (!p) return 50;
  // Composite: health, VMS alignment, coordination inverse, energy clarity
  const health = p.pulse_health_score ?? 50;
  const vms = p.pulse_vms ?? 50;
  const coordInv = 100 - (p.worst_coordination ?? 50);
  const driftStr = Math.min(100, Math.abs(p.pulse_drift ?? 0) * 2);
  return Math.round(health * 0.3 + vms * 0.2 + coordInv * 0.2 + driftStr * 0.3);
}

function deriveTradeType(p, hero) {
  const verdict = p?.prevailing_verdict || hero?.prism_verdict || '';
  if (/trap/i.test(verdict)) return 'NARRATIVE TRAP';
  if (/supported/i.test(verdict)) return 'STRUCTURALLY SUPPORTED';
  const or = p?.pulse_or ?? 1;
  if (or > 1.3) return 'OVERREACTION';
  if ((p?.worst_coordination ?? 0) > 60) return 'CROWDED TRADE';
  return 'MONITORING';
}

function deriveTimeWindow(p) {
  const exDays = p?.nearest_exhaustion_days;
  if (exDays == null) return '—';
  if (exDays <= 3) return '1–3 days';
  if (exDays <= 7) return '3–7 days';
  if (exDays <= 14) return '1–2 weeks';
  return '2+ weeks';
}

function momentumLabel(p) {
  const energy = p?.avg_energy_remaining ?? 50;
  const drift = Math.abs(p?.pulse_drift ?? 0);
  if (energy >= 70 && drift >= 20) return 'HIGH';
  if (energy >= 45 || drift >= 10) return 'MODERATE';
  return 'LOW';
}

function breakdownRiskLabel(p) {
  const frag = fragility(p);
  if (frag == null) return 'UNKNOWN';
  if (frag >= 65) return 'ELEVATED';
  if (frag >= 40) return 'MODERATE';
  return 'LOW';
}

function signalQualityLabel(p) {
  const vms = p?.pulse_vms ?? 50;
  if (vms >= 65) return 'HIGH';
  if (vms >= 40) return 'MODERATE';
  return 'LOW';
}

function netBiasLabel(p) {
  const drift = p?.pulse_drift ?? 0;
  const sentiment = p?.net_sentiment ?? 0;
  if (drift > 15 || sentiment > 20) return 'BULLISH';
  if (drift < -15 || sentiment < -20) return 'BEARISH';
  return 'NEUTRAL';
}

function colorForRisk(label) {
  if (/elevated|high/i.test(label)) return 'var(--red)';
  if (/moderate/i.test(label)) return 'var(--yellow)';
  if (/low/i.test(label)) return 'var(--green)';
  return 'var(--sub)';
}

function colorForBias(label) {
  if (/bullish/i.test(label)) return 'var(--green)';
  if (/bearish/i.test(label)) return 'var(--red)';
  return 'var(--sub)';
}

function colorForMomentum(label) {
  if (/high/i.test(label)) return 'var(--text)';
  if (/moderate/i.test(label)) return 'var(--yellow)';
  return 'var(--sub)';
}

function colorForSignal(label) {
  if (/high/i.test(label)) return 'var(--green)';
  if (/moderate/i.test(label)) return 'var(--yellow)';
  return 'var(--yellow)';
}

// ── Build trade reasoning bullets ──────────────────────────────────────────
function buildWhyBullets(p, hero) {
  const bullets = [];
  const vms = p?.pulse_vms;
  if (vms != null) {
    const trust = vms >= 65 ? 'High' : vms >= 40 ? 'Moderate' : 'Low';
    bullets.push(`${trust} narrative trust (VMS ${Math.round(vms)})`);
  }
  const fvd = p?.fvd_pct ?? (hero?.fair_value && hero?.price ? ((hero.price - hero.fair_value) / hero.fair_value * 100) : null);
  if (fvd != null) {
    const sign = fvd > 0 ? '+' : '';
    bullets.push(`${sign}${Math.round(fvd)}% ${fvd > 0 ? 'overvaluation' : 'undervaluation'} vs fair value`);
  }
  const activeNarr = p?.active_narrative_count;
  if (activeNarr != null) {
    const { isBear } = deriveDirection(p, hero);
    bullets.push(`${activeNarr} active narrative${activeNarr !== 1 ? 's' : ''} ${isBear ? '(bearish aligned)' : '(bullish aligned)'}`);
  }
  const energy = p?.avg_energy_remaining;
  if (energy != null) {
    bullets.push(energy >= 60 ? 'High narrative energy' : energy >= 35 ? 'Moderate narrative energy' : 'Low narrative energy — fading');
  }
  const or = p?.pulse_or;
  if (or != null && or > 1.1) {
    bullets.push(`Overreaction ratio: ${or.toFixed(1)}`);
  }
  if (!bullets.length) bullets.push('Insufficient data for trade reasoning');
  return bullets;
}

function buildRiskBullets(p) {
  const bullets = [];
  const decay = (p?.decay_status || '').toLowerCase();
  if (decay === 'fresh' || decay === 'active') bullets.push('Narrative still early — may strengthen');
  if (decay === 'decaying' || decay === 'dormant') bullets.push('Narrative fading — momentum may stall');
  const coord = p?.worst_coordination ?? 0;
  if (coord < 30) bullets.push('No coordination unwind yet');
  if (coord >= 60) bullets.push('High coordination — crowded trade risk');
  const shifted = p?.narrative_shifted;
  if (shifted) bullets.push('Narrative recently shifted — unstable');
  const loyalty = p?.narrative_loyalty;
  if (loyalty != null && loyalty < 40) bullets.push('Low narrative loyalty — sentiment fragile');
  if (loyalty != null && loyalty >= 70) bullets.push('High narrative loyalty — sticky sentiment');
  const sentMom = (p?.sentiment_momentum || '').toLowerCase();
  if (sentMom.includes('accelerat')) bullets.push('Sentiment accelerating — may overshoot');
  if (!bullets.length) bullets.push('Standard market risk applies');
  return bullets;
}

function buildIgnoreBullets(p, hero) {
  const bullets = [];
  const vms = p?.pulse_vms ?? 50;
  if (vms < 40) bullets.push('Low-verification headline claims');
  const trapCount = p?.trap_count ?? 0;
  if (trapCount > 0) bullets.push('Coordinated narrative signals (potential manipulation)');
  const or = p?.pulse_or ?? 1;
  if (or > 1.3) bullets.push('Reactionary price moves without fundamental backing');
  const coord = p?.worst_coordination ?? 0;
  if (coord > 50) bullets.push('Consensus opinion forming without evidence');
  if (!bullets.length) bullets.push('No specific noise signals detected');
  return bullets;
}

// ── Render functions ────────────────────────────────────────────────────────

function renderVerdictCard(p, hero) {
  const el = document.getElementById('verdict-card');
  if (!el) return;

  const { dir, isBear } = deriveDirection(p, hero);
  const confidence = deriveConfidence(p);
  const tradeType = deriveTradeType(p, hero);
  const timeWindow = deriveTimeWindow(p);
  const whyBullets = buildWhyBullets(p, hero);
  const riskBullets = buildRiskBullets(p);
  const ignoreBullets = buildIgnoreBullets(p, hero);

  const borderColor = isBear ? 'rgba(239,68,68,0.4)' : dir === 'LONG' ? 'rgba(34,197,94,0.4)' : 'rgba(255,255,255,0.08)';
  const bgColor = isBear ? 'rgba(239,68,68,0.05)' : dir === 'LONG' ? 'rgba(34,197,94,0.05)' : 'var(--card)';
  const dirColor = isBear ? 'var(--red)' : dir === 'LONG' ? 'var(--green)' : 'var(--sub)';
  const patternLabel = tradeType === 'NARRATIVE TRAP' ? 'Narrative Trap'
    : tradeType === 'OVERREACTION' ? 'Overreaction'
    : tradeType === 'CROWDED TRADE' ? 'Crowded Trade'
    : tradeType === 'STRUCTURALLY SUPPORTED' ? 'Structurally Supported'
    : 'Monitoring';

  el.innerHTML = `
    <div class="card" style="border:1px solid ${borderColor}; background:${bgColor};">
      <div class="flex small">
        <div>TRADE VERDICT</div>
        <div>CONFIDENCE</div>
      </div>
      <div class="flex" style="margin-top:10px;">
        <div>
          <div style="font-size:26px; font-weight:700; color:${dirColor};">${esc(dir)}</div>
          <div class="small" style="text-transform:none; letter-spacing:0;">${esc(patternLabel)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:26px; font-weight:700;">${confidence}</div>
          <div class="small" style="text-transform:none; letter-spacing:0;">/100</div>
        </div>
      </div>
      <div class="small" style="margin-top:10px; text-transform:none; letter-spacing:0;">
        Time Window: <strong>${esc(timeWindow)}</strong>
      </div>
      <hr>
      <div class="small">WHY THIS TRADE</div>
      <ul style="margin-top:8px;">
        ${whyBullets.map(b => `<li>${esc(b)}</li>`).join('')}
      </ul>
      <hr>
      <div class="small">RISK FACTORS</div>
      <ul style="margin-top:8px;">
        ${riskBullets.map(b => `<li>${esc(b)}</li>`).join('')}
      </ul>
      <hr>
      <div class="small">WHAT TO IGNORE</div>
      <ul style="margin-top:8px; color:var(--sub);">
        ${ignoreBullets.map(b => `<li>${esc(b)}</li>`).join('')}
      </ul>
    </div>`;
}

function renderHeroCard(p, hero) {
  const el = document.getElementById('hero-card');
  if (!el) return;

  const { dir } = deriveDirection(p, hero);
  const confidence = deriveConfidence(p);
  const tradeType = deriveTradeType(p, hero);
  const biasLabel = dir === 'SHORT' ? 'SHORT BIAS' : dir === 'LONG' ? 'LONG BIAS' : 'NEUTRAL';
  const patternLabel = tradeType === 'NARRATIVE TRAP' ? 'NARRATIVE TRAP'
    : tradeType === 'OVERREACTION' ? 'OVERREACTION'
    : tradeType === 'CROWDED TRADE' ? 'CROWDED TRADE'
    : tradeType === 'STRUCTURALLY SUPPORTED' ? 'STRUCTURALLY SUPPORTED'
    : 'MONITORING';

  el.innerHTML = `
    <div class="card">
      <div class="title">${esc(TICKER)}</div>
      <div class="small" style="margin-top:4px; text-transform:none; letter-spacing:0;">
        ${esc(biasLabel)} &middot; ${esc(patternLabel)} &middot; ${confidence} CONFIDENCE
      </div>
      <div class="small" style="margin-top:6px; text-transform:none; letter-spacing:0;">
        TRADE TYPE: ${esc(tradeType)}
      </div>
    </div>`;
}

function renderDiagnosticsCard(p) {
  const el = document.getElementById('diagnostics-card');
  if (!el) return;

  const momentum = momentumLabel(p);
  const breakdown = breakdownRiskLabel(p);
  const signal = signalQualityLabel(p);
  const bias = netBiasLabel(p);

  el.innerHTML = `
    <div class="card">
      <div class="small">MODEL DIAGNOSTICS</div>
      <div class="diag-grid" style="margin-top:12px;">
        <div>
          <div class="small" style="text-transform:none; letter-spacing:0;">Momentum Strength</div>
          <div style="font-size:15px; font-weight:600; color:${colorForMomentum(momentum)};">${esc(momentum)}</div>
        </div>
        <div>
          <div class="small" style="text-transform:none; letter-spacing:0;">Breakdown Risk</div>
          <div style="font-size:15px; font-weight:600; color:${colorForRisk(breakdown)};">${esc(breakdown)}</div>
        </div>
        <div>
          <div class="small" style="text-transform:none; letter-spacing:0;">Signal Quality</div>
          <div style="font-size:15px; font-weight:600; color:${colorForSignal(signal)};">${esc(signal)}</div>
        </div>
        <div>
          <div class="small" style="text-transform:none; letter-spacing:0;">Net Bias</div>
          <div style="font-size:15px; font-weight:600; color:${colorForBias(bias)};">${esc(bias)}</div>
        </div>
      </div>
    </div>`;
}

function renderNarrativeCard(p, hero) {
  const el = document.getElementById('narrative-card');
  if (!el) return;

  const text = p?.pulse_summary || hero?.forensic_rebuttal || hero?.story_claim || hero?.mda_snippet || 'No narrative analysis available for this ticker.';

  el.innerHTML = `
    <div class="card">
      <div class="small">PRIMARY NARRATIVE</div>
      <div style="margin-top:10px; font-size:14px; line-height:1.65; color:var(--text);">
        ${esc(text)}
      </div>
    </div>`;
}

function renderSignalsCard(p, hero) {
  const el = document.getElementById('signals-card');
  if (!el) return;

  const signals = [];

  const or = p?.pulse_or;
  if (or != null) signals.push(`Overreaction ratio: ${or.toFixed(1)}`);

  const vms = p?.pulse_vms;
  if (vms != null) signals.push(`VMS (trust): ${Math.round(vms)}`);

  const decay = p?.decay_status;
  if (decay) signals.push(`Narrative decay: ${decay.toLowerCase()}`);

  const energy = p?.avg_energy_remaining;
  if (energy != null) signals.push(`Residual energy: ${Math.round(energy)}/100`);

  const fvd = p?.fvd_pct;
  if (fvd != null) signals.push(`Fair value gap: ${fvd > 0 ? '+' : ''}${fvd.toFixed(1)}%`);

  const coord = p?.pulse_coordination;
  if (coord != null) signals.push(`Coordination: ${Math.round(coord)}/100`);

  const health = p?.pulse_health_score;
  if (health != null) signals.push(`Health score: ${Math.round(health)}/100`);

  const sentiment = p?.net_sentiment;
  if (sentiment != null) signals.push(`Net sentiment: ${sentiment > 0 ? '+' : ''}${sentiment.toFixed(0)}`);

  if (!signals.length) signals.push('No supporting signal data available');

  el.innerHTML = `
    <div class="card">
      <div class="small">SUPPORTING SIGNALS</div>
      <ul style="margin-top:10px;">
        ${signals.map(s => `<li>${esc(s)}</li>`).join('')}
      </ul>
    </div>`;
}

// ── Data loading ────────────────────────────────────────────────────────────

async function loadHero() {
  if (!TICKER) return null;
  try {
    const cols = [
      'ticker','price','price_change_pct','narrative_state','story_claim',
      'forensic_rebuttal','prism_verdict','institutional_positioning','fair_value',
      'stock_type','mda_snippet','sector_name'
    ].join(',');

    const [rows, snapRows] = await Promise.all([
      sbFetch('v_dash_daily_story', { select: cols, ticker: `eq.${TICKER}`, order: 'snapshot_date.desc', limit: '1' }),
      sbFetch('ticker_snapshots', {
        select: 'snapshot_date,price_close,price_change_pct',
        ticker: `eq.${TICKER}`,
        order:  'snapshot_date.desc',
        limit:  '1'
      }).catch(() => [])
    ]);

    if (!rows.length) {
      document.getElementById('hero-card').innerHTML = `<div class="card"><div class="no-data">No data found for "${esc(TICKER)}".</div></div>`;
      return null;
    }

    const r = rows[0];
    const snap = (snapRows || [])[0];
    if (snap && snap.snapshot_date > (r.snapshot_date || '')) {
      r.price = snap.price_close;
      r.price_change_pct = snap.price_change_pct;
    }

    return r;
  } catch (err) {
    document.getElementById('hero-card').innerHTML = `<div class="card"><div class="inline-err">Failed to load: ${esc(err.message)}</div></div>`;
    return null;
  }
}

async function loadPulse() {
  if (!TICKER) return null;
  try {
    const rows = await sbFetch('ticker_pulse', {
      select: [
        'decay_status','direction_forecast','pulse_health_score',
        'avg_energy_remaining','nearest_exhaustion_days','pulse_drift',
        'worst_coordination','trap_count','prevailing_verdict','fvd_pct',
        'fair_value','pulse_label','pulse_vms','pulse_coordination',
        'pulse_or','prevailing_narrative','prevailing_energy',
        'narrative_shifted','pulse_nrs','pulse_ccp','net_sentiment',
        'sentiment_momentum','active_narrative_count','pulse_summary',
        'narrative_loyalty','worst_nrs','coordinated_count','worst_vms'
      ].join(','),
      ticker:  `eq.${TICKER}`,
      order:   'snapshot_date.desc',
      limit:   '1'
    }).catch(() => []);
    return rows[0] || null;
  } catch { return null; }
}

// ── Export Report ────────────────────────────────────────────────────────────
function exportReport() {
  const date = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  const verdictCard = document.getElementById('verdict-card');
  const heroCard = document.getElementById('hero-card');
  const diagCard = document.getElementById('diagnostics-card');
  const narrCard = document.getElementById('narrative-card');
  const sigCard = document.getElementById('signals-card');

  let report = `MARKET PRISM — TRADE INTELLIGENCE REPORT
${'═'.repeat(50)}
Ticker: ${TICKER}
Date: ${date}

TRADE VERDICT
${'─'.repeat(50)}
${verdictCard?.textContent?.trim().replace(/\s+/g, ' ') || 'N/A'}

MODEL DIAGNOSTICS
${'─'.repeat(50)}
${diagCard?.textContent?.trim().replace(/\s+/g, ' ') || 'N/A'}

PRIMARY NARRATIVE
${'─'.repeat(50)}
${narrCard?.textContent?.trim().replace(/\s+/g, ' ') || 'N/A'}

SUPPORTING SIGNALS
${'─'.repeat(50)}
${sigCard?.textContent?.trim().replace(/\s+/g, ' ') || 'N/A'}

${'═'.repeat(50)}
Generated by Market Prism · ${date}
https://marketprism.io/ticker/${TICKER}
`;

  const blob = new Blob([report], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${TICKER}-market-prism-report-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Create Image ────────────────────────────────────────────────────────────
async function createImage() {
  const overlay = document.getElementById('capture-overlay');
  overlay.classList.add('active');
  try {
    if (typeof html2canvas === 'undefined') {
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = resolve;
        script.onerror = () => reject(new Error('Failed to load html2canvas'));
        document.head.appendChild(script);
      });
    }
    const target = document.querySelector('.container');
    const canvas = await html2canvas(target, {
      backgroundColor: '#0f1117',
      scale: 2,
      useCORS: true,
      logging: false,
      windowWidth: 900,
      onclone: (doc) => {
        const ab = doc.getElementById('action-bar');
        if (ab) ab.style.display = 'none';
      }
    });
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${TICKER}-market-prism-${new Date().toISOString().slice(0,10)}.png`;
      a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  } catch (err) {
    console.error('Image capture failed:', err);
    alert('Failed to create image. Please try again.');
  } finally {
    overlay.classList.remove('active');
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
async function refreshAll() {
  if (!TICKER) return;

  const [heroData, pulse] = await Promise.all([
    loadHero(),
    loadPulse()
  ]);

  renderVerdictCard(pulse, heroData);
  renderHeroCard(pulse, heroData);
  renderDiagnosticsCard(pulse);
  renderNarrativeCard(pulse, heroData);
  renderSignalsCard(pulse, heroData);

  // Show action bar once loaded
  document.getElementById('action-bar').style.display = 'flex';
}

refreshAll();

// Auto-refresh every 5 minutes
setInterval(() => refreshAll(), 5 * 60 * 1000);

// Refresh when user tabs back
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) refreshAll();
});
</script>
