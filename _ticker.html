<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker — Forensic Market Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --surface3: #E8E5DF;
    --border: #E2DED8;
    --border-strong: #C8C4BE;
    --text-primary: #1A1916;
    --text-secondary: #5C5A55;
    --text-tertiary: #9B9892;
    --accent-breaking: #C0392B;
    --accent-breaking-bg: #FDF0EE;
    --accent-surging: #27AE60;
    --accent-surging-bg: #EEF8F2;
    --accent-fragile: #D68910;
    --accent-fragile-bg: #FEF9EC;
    --accent-stable: #2471A3;
    --accent-stable-bg: #EBF5FB;
    --accent-trap: #C0392B;
    --accent-supported: #1E8449;
    --font: 'DM Sans', system-ui, sans-serif;
    --mono: 'DM Mono', monospace;
  }

  html { font-size: 16px; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  .page-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Nav ── */
  .site-nav {
    padding: 24px 0 0;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
  }
  .nav-back {
    color: var(--text-tertiary);
    text-decoration: none;
    transition: color 0.12s;
  }
  .nav-back:hover { color: var(--text-primary); }
  .nav-sep { color: var(--border-strong); }
  .nav-ticker { color: var(--text-secondary); font-family: var(--mono); font-size: 12px; }

  /* ── Hero ── */
  .ticker-hero {
    padding: 20px 0 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }
  .hero-left { flex: 1; min-width: 0; }
  .hero-ticker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .hero-ticker {
    font-size: 30px;
    font-weight: 500;
    font-family: var(--mono);
    letter-spacing: -0.02em;
  }
  .hero-state-badge {
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 5px;
    border: 1px solid;
    letter-spacing: 0.04em;
  }
  .badge-breaking { background: var(--accent-breaking-bg); color: var(--accent-breaking); border-color: #F5C6C2; }
  .badge-surging  { background: var(--accent-surging-bg);  color: var(--accent-surging);  border-color: #BCEACE; }
  .badge-fragile  { background: var(--accent-fragile-bg);  color: var(--accent-fragile);  border-color: #FADED9; }
  .badge-stable   { background: var(--accent-stable-bg);   color: var(--accent-stable);   border-color: #BAD6EC; }

  .verdict-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid;
  }
  .verdict-trap       { background: var(--accent-breaking-bg); color: var(--accent-breaking); border-color: #F5C6C2; }
  .verdict-supported  { background: var(--accent-surging-bg);  color: var(--accent-supported); border-color: #BCEACE; }
  .verdict-monitoring { background: var(--surface2); color: var(--text-secondary); border-color: var(--border); }

  .hero-claim {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 520px;
  }
  .hero-right { text-align: right; flex-shrink: 0; }
  .hero-price {
    font-size: 26px;
    font-weight: 500;
    font-family: var(--mono);
    letter-spacing: -0.02em;
  }
  .hero-delta { font-size: 13px; font-family: var(--mono); margin-top: 2px; }
  .delta-pos { color: var(--accent-surging); }
  .delta-neg { color: var(--accent-breaking); }
  .delta-flat { color: var(--text-tertiary); }
  .hero-fv { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; }
  .hero-fv span { font-family: var(--mono); color: var(--text-secondary); }

  /* ── Section ── */
  .section { margin-bottom: 24px; }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-label-sub {
    font-size: 11px;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-tertiary);
  }
  .section-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  /* ── Skeleton ── */
  .skel {
    background: var(--surface3);
    border-radius: 4px;
    animation: skel-pulse 1.4s ease-in-out infinite;
  }
  @keyframes skel-pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

  /* ── Metrics strip ── */
  .metrics-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--border);
  }
  @media (max-width: 600px) { .metrics-strip { grid-template-columns: repeat(2, 1fr); } }
  .metric-cell {
    padding: 12px 16px;
    border-right: 1px solid var(--border);
  }
  .metric-cell:last-child { border-right: none; }
  .metric-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  .metric-value {
    font-size: 15px;
    font-weight: 500;
    font-family: var(--mono);
    color: var(--text-primary);
  }
  .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }

  /* ── Forensic text ── */
  .forensic-pad { padding: 16px 18px; }
  .forensic-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
  }

  /* ── Chart ── */
  .chart-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 0;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chart-timeframes { display: flex; gap: 2px; }
  .tf-btn {
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 9px;
    border-radius: 5px;
    border: 1px solid transparent;
    background: none;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.1s;
  }
  .tf-btn:hover { color: var(--text-secondary); background: var(--surface2); }
  .tf-btn.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }
  .chart-sort { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-tertiary); }
  .sort-select {
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    outline: none;
  }
  .sort-select:focus { border-color: var(--border-strong); }
  .chart-outer {
    position: relative;
    padding: 10px 14px 0;
    height: 210px;
  }
  .chart-outer canvas { display: block; width: 100%; height: 100%; }
  .chart-bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .chart-legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-tertiary); }
  .leg-line { width: 14px; height: 2px; border-radius: 1px; }
  .leg-dash { width: 14px; height: 0; border-top: 2px dashed var(--border-strong); }
  .leg-dot  { width: 7px; height: 7px; border-radius: 50%; }
  .chart-tip {
    position: absolute;
    background: var(--text-primary);
    color: #fff;
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 8px;
    border-radius: 5px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    white-space: nowrap;
    z-index: 10;
    top: 0; left: 0;
  }
  .chart-no-data {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    font-size: 13px;
    color: var(--text-tertiary);
  }
  /* ── Story popup (click dot) ── */
  .story-popup {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    padding: 12px 14px;
    width: 260px;
    z-index: 20;
    top: 0; left: 0;
    display: none;
  }
  .story-popup.visible { display: block; }
  .popup-close {
    position: absolute;
    top: 8px; right: 10px;
    font-size: 14px;
    color: var(--text-tertiary);
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
    padding: 2px 4px;
  }
  .popup-close:hover { color: var(--text-primary); }
  .popup-date { font-size: 10px; font-family: var(--mono); color: var(--text-tertiary); margin-bottom: 5px; }
  .popup-headline { font-size: 13px; font-weight: 500; color: var(--text-primary); line-height: 1.45; margin-bottom: 6px; }
  .popup-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
  .popup-vms {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-family: var(--mono);
    margin-top: 8px;
    padding: 2px 7px;
    border-radius: 99px;
    border: 1px solid;
  }
  .popup-vms-bull { background: var(--accent-surging-bg); color: var(--accent-supported); border-color: #BCEACE; }
  .popup-vms-bear { background: var(--accent-breaking-bg); color: var(--accent-breaking); border-color: #F5C6C2; }
  /* ── Bear Stories list ── */
  .bear-stories-wrap { border-top: 1px solid var(--border); }
  .bear-stories-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
  }
  .bear-stories-header:hover { background: var(--surface2); }
  .bear-stories-title {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bear-count-badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 1px 6px;
    border-radius: 99px;
    background: var(--accent-breaking-bg);
    color: var(--accent-breaking);
    border: 1px solid #F5C6C2;
  }
  .bear-toggle-icon { font-size: 12px; color: var(--text-tertiary); transition: transform 0.15s; }
  .bear-toggle-icon.open { transform: rotate(180deg); }
  .bear-stories-list { display: none; }
  .bear-stories-list.open { display: block; }
  .bear-story-item {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .bear-story-item:hover { background: var(--surface2); cursor: pointer; }
  .bear-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-breaking); flex-shrink: 0; margin-top: 4px; }
  .bear-story-date { font-size: 10px; font-family: var(--mono); color: var(--text-tertiary); white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
  .bear-story-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  /* ── Story Lifecycle ── */
  .lc-pad { padding: 16px 18px; }
  .lc-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .lc-stage { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .lc-energy { font-size: 12px; font-family: var(--mono); color: var(--text-tertiary); }
  .lc-track {
    height: 7px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 7px;
  }
  .lc-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .lc-fill-birth    { background: linear-gradient(90deg,#1E8449,#27AE60); }
  .lc-fill-growth   { background: linear-gradient(90deg,#2471A3,#3498DB); }
  .lc-fill-maturity { background: linear-gradient(90deg,#D68910,#F39C12); }
  .lc-fill-decline  { background: linear-gradient(90deg,#C0392B,#E74C3C); }
  .lc-fill-death    { background: var(--border-strong); }
  .lc-markers {
    display: flex;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .lc-marker {
    font-size: 10px;
    color: var(--text-tertiary);
  }
  .lc-marker.active { color: var(--text-secondary); font-weight: 500; }
  .lc-stats {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
  }
  .lc-stat { background: var(--bg); padding: 9px 13px; }
  .lc-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }
  .lc-stat-val {
    font-size: 14px;
    font-weight: 500;
    font-family: var(--mono);
    color: var(--text-primary);
  }

  /* ── Contagion Map ── */
  .ct-pad { padding: 16px 18px; }
  .ct-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .ct-desc { font-size: 13px; color: var(--text-secondary); }
  .ct-meta { display: flex; align-items: center; gap: 8px; }
  .ct-score {
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    padding: 3px 9px;
    border-radius: 99px;
    border: 1px solid;
    white-space: nowrap;
  }
  .ct-score-high   { background: var(--accent-breaking-bg); color: var(--accent-breaking); border-color: #F5C6C2; }
  .ct-score-mid    { background: var(--accent-fragile-bg);  color: var(--accent-fragile);  border-color: #FADED9; }
  .ct-score-low    { background: var(--accent-stable-bg);   color: var(--accent-stable);   border-color: #BAD6EC; }
  .ct-score-none   { background: var(--surface2); color: var(--text-tertiary); border-color: var(--border); }
  .ct-theme {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: var(--mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 99px;
  }

  /* Horizontal flow: upstream chips → arrow → focal → arrow → downstream chips */
  .ct-flow {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .ct-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 90px;
  }
  .ct-group-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    margin-bottom: 2px;
  }
  .ct-chip {
    display: inline-flex;
    align-items: center;
    font-size: 12px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-secondary);
    white-space: nowrap;
    width: fit-content;
  }
  .ct-chip.upstream   { background: var(--accent-stable-bg);   border-color: #BAD6EC; color: var(--accent-stable); }
  .ct-chip.downstream { background: var(--accent-breaking-bg); border-color: #F5C6C2; color: var(--accent-breaking); }
  .ct-chip.focal {
    background: var(--text-primary);
    border-color: var(--text-primary);
    color: #fff;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 99px;
    position: relative;
  }
  .ct-chip.focal::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 99px;
    border: 1px dashed var(--border-strong);
    pointer-events: none;
  }
  .ct-empty { font-size: 12px; color: var(--text-tertiary); font-style: italic; padding: 4px 0; }

  /* Arrow connector */
  .ct-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 10px;
    flex-shrink: 0;
    gap: 2px;
  }
  .ct-arrow-line {
    width: 32px;
    height: 1px;
    background: var(--border-strong);
    position: relative;
  }
  .ct-arrow-line::after {
    content: '▶';
    font-size: 8px;
    color: var(--border-strong);
    position: absolute;
    right: -6px;
    top: -5px;
  }
  .ct-arrow-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  /* Causal chain strip */
  .ct-chain {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    flex-wrap: wrap;
  }
  .ct-chain-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-tertiary);
    white-space: nowrap;
    margin-top: 1px;
  }
  .ct-chain-step {
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
  }
  .ct-chain-arrow {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }

  /* ── Prerequisites ── */
  .pr-pad { padding: 14px 18px; }
  .pr-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .pr-desc { font-size: 13px; color: var(--text-secondary); }
  .pr-count {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-tertiary);
  }
  .pr-count strong { font-size: 14px; color: var(--text-primary); }
  .pr-list { display: flex; flex-direction: column; }
  .pr-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .pr-item:last-child { border-bottom: none; }
  .pr-status {
    font-size: 10px;
    font-weight: 500;
    font-family: var(--mono);
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .pr-met     { background: var(--accent-surging-bg); color: var(--accent-supported); border-color: #BCEACE; }
  .pr-not-met { background: var(--accent-breaking-bg); color: var(--accent-breaking); border-color: #F5C6C2; }
  .pr-pending { background: var(--surface2); color: var(--text-tertiary); border-color: var(--border); }
  .pr-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  /* ── Historical Parallels ── */
  .par-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .par-item:last-child { border-bottom: none; }
  .par-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 5px;
  }
  .par-left { display: flex; align-items: center; gap: 7px; }
  .par-ticker {
    font-size: 11px;
    font-weight: 500;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .par-date { font-size: 12px; color: var(--text-tertiary); }
  .par-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .par-days { font-size: 11px; font-family: var(--mono); color: var(--text-tertiary); }
  .par-pct { font-size: 13px; font-weight: 500; font-family: var(--mono); }
  .par-pct-pos { color: var(--accent-surging); }
  .par-pct-neg { color: var(--accent-breaking); }
  .par-name { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 6px; }
  .par-sim {
    display: flex;
    align-items: center;

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = window.__env?.SUPABASE_URL  || '';
const SUPABASE_ANON = window.__env?.SUPABASE_ANON || '';

// Extract ticker from URL path: /ticker/NVDA
const pathParts = location.pathname.split('/').filter(Boolean);
const TICKER = decodeURIComponent(pathParts[pathParts.length - 1] || '');

if (!TICKER) {
  document.getElementById('hero').innerHTML = '<div class="no-data">No ticker specified in URL.</div>';
}

document.title = TICKER ? `${TICKER} — Forensic Market Engine` : 'Forensic Market Engine';
document.getElementById('nav-ticker').textContent = TICKER;

// ── Supabase helper ──────────────────────────────────────────────────────────
async function sbFetch(table, params) {
  const qs = Object.entries(params)
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
    .join('&');
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Accept': 'application/json'
    }
  });
  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`${res.status}: ${body}`);
  }
  return res.json();
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return s ? String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
function fmtPrice(p) {
  if (p == null) return '—';
  return '$' + (p >= 100 ? p.toFixed(2) : p.toFixed(3));
}
function fmtPct(p) {
  if (p == null) return { cls:'delta-flat', txt:'—' };
  return { cls: p > 0 ? 'delta-pos' : p < 0 ? 'delta-neg' : 'delta-flat', txt: (p > 0 ? '+' : '') + p.toFixed(2) + '%' };
}
function stateClass(s) {
  return ({ Breaking:'badge-breaking', Surging:'badge-surging', Fragile:'badge-fragile', Stable:'badge-stable' })[s] || 'badge-stable';
}

// ── 1. Hero + Forensic ───────────────────────────────────────────────────────
async function loadHero() {
  if (!TICKER) return null;
  try {
    const cols = [
      'ticker','price','price_change_pct','narrative_state','story_claim',
      'forensic_rebuttal','prism_verdict','pe_ratio','eps_surprise_pct',
      'guidance_direction','days_to_earnings','institutional_positioning',
      'fair_value','recovery_probability','recovery_window_days'
    ].join(',');

    const [rows, healthRows] = await Promise.all([
      sbFetch('v_dash_daily_story', { select: cols, ticker: `eq.${TICKER}`, limit: '1' }),
      sbFetch('v_dash_narrative_health', {
        select: 'narrative_health,narrative_trend,attention_trend',
        ticker: `eq.${TICKER}`,
        order:  'snapshot_date.desc',
        limit:  '1'
      }).catch(() => [])
    ]);

    if (!rows.length) {
      document.getElementById('hero').innerHTML = `<div class="no-data">No data found for "${esc(TICKER)}".</div>`;
      return null;
    }

    const r = rows[0];
    const h = healthRows[0] || {};
    const delta = fmtPct(r.price_change_pct);
    const verdictClass = r.prism_verdict === 'Narrative Trap' ? 'verdict-trap'
      : r.prism_verdict === 'Structurally Supported' ? 'verdict-supported'
      : 'verdict-monitoring';

    // Narrative trend badge
    const trendIcon = h.narrative_trend === 'Rising' ? '↑' : h.narrative_trend === 'Collapsing' ? '↓' : h.narrative_trend === 'Stable' ? '→' : '';
    const trendBadge = h.narrative_trend
      ? `<span class="hero-trend-badge trend-${(h.narrative_trend||'').toLowerCase()}">${trendIcon} ${esc(h.narrative_trend)}</span>` : '';

    document.getElementById('hero').innerHTML = `
      <div class="hero-left">
        <div class="hero-ticker-row">
          <span class="hero-ticker">${esc(r.ticker)}</span>
          <span class="hero-state-badge ${stateClass(r.narrative_state)}">${esc(r.narrative_state || '—')}</span>
          <span class="verdict-badge ${verdictClass}">${esc(r.prism_verdict || 'Monitoring')}</span>
          ${trendBadge}
        </div>
        <div class="hero-claim">${esc(r.story_claim || '')}</div>
      </div>
      <div class="hero-right">
        <div class="hero-price">${fmtPrice(r.price)}</div>
        <div class="hero-delta ${delta.cls}">${delta.txt}</div>
        ${r.fair_value != null ? `<div class="hero-fv">Fair value <span>${fmtPrice(r.fair_value)}</span></div>` : ''}
      </div>`;

    // Forensic text
    document.getElementById('forensic-text').innerHTML = r.forensic_rebuttal
      ? `<div class="forensic-text">${esc(r.forensic_rebuttal)}</div>`
      : `<div class="no-data" style="padding:0;">No forensic analysis available.</div>`;

    // Metrics strip — real fundamentals only
    const epsSign  = r.eps_surprise_pct > 0 ? '+' : '';
    const epsColor = r.eps_surprise_pct > 0 ? 'color:var(--accent-surging)' : r.eps_surprise_pct < 0 ? 'color:var(--accent-breaking)' : '';
    document.getElementById('metrics-strip').innerHTML = `
      <div class="metric-cell">
        <div class="metric-label">P/E Ratio</div>
        <div class="metric-value">${r.pe_ratio != null ? r.pe_ratio.toFixed(1) + 'x' : '—'}</div>
        <div class="metric-sub">Price / Earnings</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">EPS Surprise</div>
        <div class="metric-value" style="${epsColor}">${r.eps_surprise_pct != null ? epsSign + r.eps_surprise_pct.toFixed(1) + '%' : '—'}</div>
        <div class="metric-sub">vs. estimate</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">Earnings In</div>
        <div class="metric-value">${r.days_to_earnings != null ? r.days_to_earnings + 'd' : '—'}</div>
        <div class="metric-sub">${r.guidance_direction && r.guidance_direction !== 'Neutral' ? 'Guidance: ' + esc(r.guidance_direction) : 'Next report'}</div>
      </div>
      <div class="metric-cell">
        <div class="metric-label">Positioning</div>
        <div class="metric-value" style="font-size:12px;">${esc(r.institutional_positioning || '—')}</div>
        <div class="metric-sub">Institutional</div>
      </div>`;

    return { ...r, narrative_health: h.narrative_health, narrative_trend: h.narrative_trend };
  } catch (err) {
    document.getElementById('hero').innerHTML = `<div class="inline-err">Failed to load: ${esc(err.message)}</div>`;
    return null;
  }
}

// ── 2. Price Chart ───────────────────────────────────────────────────────────
let ALL_SNAPS = [];   // full price history
let ALL_NARRS = [];   // full scorecard rows with story data
let CHART_FV  = null; // fair value for dashed line

async function loadChart(fairValue) {
  if (!TICKER) return;
  CHART_FV = fairValue;
  try {
    ALL_SNAPS = await sbFetch('ticker_snapshots', {
      select: 'snapshot_date,price_close',
      ticker: `eq.${TICKER}`,
      order:  'snapshot_date.asc',
      limit:  '365'
    });

    // v_dash_narrative_health has sentiment_score and story context per date
    ALL_NARRS = await sbFetch('v_dash_narrative_health', {
      select: 'snapshot_date,sentiment_score,narrative_trend',
      ticker: `eq.${TICKER}`,
      order:  'snapshot_date.asc',
      limit:  '365'
    }).catch(() => []);

    if (!ALL_SNAPS.length) {
      document.getElementById('chart-outer').innerHTML = '<div class="chart-no-data">No price history available.</div>';
      return;
    }

    renderChart();
    buildBearList();
  } catch (err) {
    document.getElementById('chart-outer').innerHTML = `<div class="chart-no-data" style="color:var(--accent-breaking);">Chart: ${esc(err.message)}</div>`;
  }
}

function getActiveDays() {
  const active = document.querySelector('.tf-btn.active');
  return active ? parseInt(active.dataset.days) : 90;
}

function getActiveSort() {
  return document.getElementById('story-sort')?.value || 'date-desc';
}

function filterSnaps() {
  const days = getActiveDays();
  if (!days) return ALL_SNAPS;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return ALL_SNAPS.filter(s => s.snapshot_date >= cutStr);
}

function filterNarrs() {
  const snaps   = filterSnaps();
  if (!snaps.length) return [];
  const minDate = snaps[0].snapshot_date;
  const maxDate = snaps[snaps.length - 1].snapshot_date;
  const sort    = getActiveSort();

  let narrs = ALL_NARRS.filter(n => {
    const d = n.snapshot_date?.slice(0,10);
    if (!d || d < minDate || d > maxDate) return false;
    if (sort === 'bear') return n.sentiment_score == null || n.sentiment_score <= 0;
    if (sort === 'bull') return n.sentiment_score != null && n.sentiment_score > 0;
    return true;
  });

  if (sort === 'date-asc') narrs = [...narrs].sort((a,b) => a.snapshot_date < b.snapshot_date ? -1 : 1);
  else narrs = [...narrs].sort((a,b) => a.snapshot_date > b.snapshot_date ? -1 : 1);

  return narrs;
}

function renderChart() {
  const snaps = filterSnaps();
  const narrs = filterNarrs();
  if (!snaps.length) return;
  drawChart(snaps, narrs, CHART_FV);
}

function buildBearList() {
  // Bears = negative sentiment or collapsing trend
  const bears = ALL_NARRS.filter(n =>
    (n.sentiment_score != null && n.sentiment_score <= 0) ||
    n.narrative_trend === 'Collapsing'
  );
  const wrap  = document.getElementById('bear-stories-wrap');
  const list  = document.getElementById('bear-stories-list');
  const count = document.getElementById('bear-count');

  if (!bears.length) { wrap.style.display = 'none'; return; }

  wrap.style.display = 'block';
  count.textContent  = bears.length;

  list.innerHTML = bears.map(n => `
    <div class="bear-story-item">
      <div class="bear-dot"></div>
      <div class="bear-story-date">${n.snapshot_date?.slice(0,10) || '—'}</div>
      <div class="bear-story-text">${esc(n.narrative_trend || '')}${n.sentiment_score != null ? ' · Sentiment ' + n.sentiment_score.toFixed(1) : ''}</div>
    </div>`).join('');

  document.getElementById('bear-stories-header').addEventListener('click', () => {
    const icon = document.getElementById('bear-toggle-icon');
    icon.classList.toggle('open');
    list.classList.toggle('open');
  });
}

function drawChart(snaps, narrs, fairValue) {
  const outer  = document.getElementById('chart-outer');
  const canvas = document.getElementById('price-canvas');
  const tip    = document.getElementById('chart-tip');
  const popup  = document.getElementById('story-popup');

  // Remove old listeners by replacing canvas
  const fresh = canvas.cloneNode(false);
  outer.replaceChild(fresh, canvas);
  const cv  = document.getElementById('price-canvas');
  const ctx = cv.getContext('2d');

  const W   = outer.clientWidth - 28;
  const H   = outer.clientHeight - 10;
  const DPR = devicePixelRatio || 1;

  cv.width  = W * DPR;
  cv.height = H * DPR;
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  ctx.scale(DPR, DPR);

  const prices = snaps.map(s => s.price_close).filter(p => p != null);
  if (!prices.length) return;

  const minP = Math.min(...prices) * 0.975;
  const maxP = Math.max(...prices) * 1.025;

  const PAD = { top:8, right:8, bottom:28, left:50 };
  const CW  = W - PAD.left - PAD.right;
  const CH  = H - PAD.top  - PAD.bottom;
  const N   = snaps.length;

  function xOf(i) { return PAD.left + (i / Math.max(N-1,1)) * CW; }
  function yOf(p) { return PAD.top  + (1 - (p - minP) / (maxP - minP)) * CH; }

  // Grid
  ctx.font      = `10px 'DM Mono', monospace`;
  ctx.fillStyle = '#9B9892';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const p = minP + (maxP - minP) * (i / 4);
    const y = yOf(p);
    ctx.strokeStyle = '#E2DED8'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    ctx.fillText((p >= 100 ? '$' + p.toFixed(0) : '$' + p.toFixed(2)), PAD.left - 4, y + 3);
  }

  // X labels
  ctx.textAlign = 'center';
  const every = Math.max(1, Math.floor(N / 6));
  snaps.forEach((s, i) => {
    if (i % every !== 0 && i !== N-1) return;
    const d = new Date(s.snapshot_date);
    ctx.fillText(d.toLocaleDateString('en-US', { month:'short', day:'numeric' }), xOf(i), H - PAD.bottom + 14);
  });

  // Fair value line
  if (fairValue != null && fairValue > minP && fairValue < maxP * 1.1) {
    const yFV = yOf(fairValue);
    ctx.save();
    ctx.setLineDash([5,4]);
    ctx.strokeStyle = '#C8C4BE'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(PAD.left, yFV); ctx.lineTo(W - PAD.right, yFV); ctx.stroke();
    ctx.restore();
  }

  // Area fill
  const grad = ctx.createLinearGradient(0, PAD.top, 0, H - PAD.bottom);
  grad.addColorStop(0, 'rgba(26,25,22,0.07)');
  grad.addColorStop(1, 'rgba(26,25,22,0)');
  ctx.beginPath();
  snaps.forEach((s,i) => { if (s.price_close==null) return; i===0 ? ctx.moveTo(xOf(i),yOf(s.price_close)) : ctx.lineTo(xOf(i),yOf(s.price_close)); });
  ctx.lineTo(xOf(N-1), H-PAD.bottom); ctx.lineTo(xOf(0), H-PAD.bottom); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Price line
  ctx.beginPath(); ctx.setLineDash([]);
  snaps.forEach((s,i) => { if (s.price_close==null) return; i===0 ? ctx.moveTo(xOf(i),yOf(s.price_close)) : ctx.lineTo(xOf(i),yOf(s.price_close)); });
  ctx.strokeStyle = '#1A1916'; ctx.lineWidth = 1.5; ctx.stroke();

  // Build dot map keyed by date
  const dateIdx = {};
  snaps.forEach((s,i) => { if (s.snapshot_date) dateIdx[s.snapshot_date.slice(0,10)] = i; });

  // Track dot positions for click detection
  const dotHits = [];

  narrs.forEach(n => {
    const key = n.snapshot_date?.slice(0,10);
    const idx = dateIdx[key];
    if (idx == null) return;
    const s = snaps[idx];
    if (s.price_close == null) return;
    const cx = xOf(idx);
    const cy = yOf(s.price_close);
    const isBull = n.sentiment_score != null && n.sentiment_score > 0;
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI*2);
    ctx.fillStyle   = isBull ? '#27AE60' : '#C0392B';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    dotHits.push({ cx, cy, n });
  });

  // Hover tooltip (price only)
  cv.addEventListener('mousemove', e => {
    const rect = cv.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;

    // Check if near a dot
    const hit = dotHits.find(d => Math.hypot(mx - d.cx, my - d.cy) < 8);
    cv.style.cursor = hit ? 'pointer' : 'default';

    if (hit) { tip.style.opacity = '0'; return; }

    const idx = Math.max(0, Math.min(N-1, Math.round(((mx - PAD.left) / CW) * (N-1))));
    const s   = snaps[idx];
    if (!s?.price_close) { tip.style.opacity = '0'; return; }
    tip.style.opacity = '1';
    tip.style.left    = (xOf(idx) + 10) + 'px';
    tip.style.top     = (yOf(s.price_close) - 24) + 'px';
    tip.textContent   = s.snapshot_date?.slice(5) + '  ' + fmtPrice(s.price_close);
  });
  cv.addEventListener('mouseleave', () => { tip.style.opacity = '0'; cv.style.cursor = 'default'; });

  // Click dot → show popup
  cv.addEventListener('click', e => {
    const rect = cv.getBoundingClientRect();
    const mx   = e.clientX - rect.left;
    const my   = e.clientY - rect.top;
    const hit  = dotHits.find(d => Math.hypot(mx - d.cx, my - d.cy) < 8);
    if (!hit) { popup.classList.remove('visible'); return; }

    const n      = hit.n;
    const isBull = n.sentiment_score != null && n.sentiment_score > 0;
    const trendLbl = n.narrative_trend || (isBull ? 'Bullish' : 'Bearish');

    document.getElementById('popup-date').textContent     = n.snapshot_date?.slice(0,10) || '—';
    document.getElementById('popup-headline').textContent = trendLbl;
    document.getElementById('popup-body').textContent     = n.attention_trend ? 'Attention: ' + n.attention_trend : '';
    document.getElementById('popup-vms').innerHTML        = n.sentiment_score != null
      ? `<span class="popup-vms ${isBull ? 'popup-vms-bull' : 'popup-vms-bear'}">${isBull ? '↑' : '↓'} Sentiment ${n.sentiment_score.toFixed(1)}</span>`
      : '';

    // Position popup — keep inside chart bounds
    let px = hit.cx + 10;
    let py = hit.cy - 20;
    if (px + 270 > W) px = hit.cx - 275;
    if (py < 0) py = 4;
    popup.style.left = px + 'px';
    popup.style.top  = py + 'px';
    popup.classList.add('visible');
  });

  document.getElementById('popup-close').onclick = () => popup.classList.remove('visible');
}

// ── 3. Story Lifecycle ───────────────────────────────────────────────────────
async function loadLifecycle() {
  if (!TICKER) return;
  try {
    const lc = await sbFetch('dashboard_lifecycle', {
      select: 'lifecycle_stage,lifecycle_pct',
      ticker: `eq.${TICKER}`,
      order:  'created_at.desc',
      limit:  '1'
    }).catch(() => []);

    const dm = await sbFetch('decay_metrics', {
      select: 'energy_remaining_pct,days_until_exhaustion,decay_rate',
      ticker: `eq.${TICKER}`,
      order:  'created_at.desc',
      limit:  '1'
    }).catch(() => []);

    let stage = lc[0]?.lifecycle_stage || null;
    let pct   = lc[0]?.lifecycle_pct   ?? dm[0]?.energy_remaining_pct ?? null;
    const daysLeft  = dm[0]?.days_until_exhaustion ?? null;
    const decayRate = dm[0]?.decay_rate ?? null;

    if (pct == null && !stage) {
      document.getElementById('lc-body').innerHTML = '<div class="no-data">No lifecycle data available.</div>';
      return;
    }

    if (!stage && pct != null) {
      stage = pct > 75 ? 'Birth' : pct > 50 ? 'Growth' : pct > 25 ? 'Maturity' : pct > 5 ? 'Decline' : 'Death';
    }

    const stages    = ['Birth','Growth','Maturity','Decline','Death'];
    const activeIdx = stages.indexOf(stage);
    const fillCls   = { Birth:'lc-fill-birth', Growth:'lc-fill-growth', Maturity:'lc-fill-maturity', Decline:'lc-fill-decline', Death:'lc-fill-death' }[stage] || 'lc-fill-maturity';
    const barPct    = pct != null ? Math.max(2, Math.round(pct)) : 0;

    document.getElementById('lc-body').innerHTML = `
      <div class="lc-top">
        <div class="lc-stage">${esc(stage)}</div>
        <div class="lc-energy">${pct != null ? Math.round(pct) + '% energy remaining' : '—'}</div>
      </div>
      <div class="lc-track"><div class="lc-fill ${fillCls}" style="width:${barPct}%;"></div></div>
      <div class="lc-markers">
        ${stages.map((s,i) => `<div class="lc-marker ${i === activeIdx ? 'active' : ''}">${s}</div>`).join('')}
      </div>
      <div class="lc-stats">
        <div class="lc-stat">
          <div class="lc-stat-label">Days Remaining</div>
          <div class="lc-stat-val">${daysLeft != null ? daysLeft : '—'}</div>
        </div>
        <div class="lc-stat">
          <div class="lc-stat-label">Decay Rate</div>
          <div class="lc-stat-val">${decayRate != null ? decayRate.toFixed(3) : '—'}</div>
        </div>
        <div class="lc-stat">
          <div class="lc-stat-label">Energy</div>
          <div class="lc-stat-val">${pct != null ? Math.round(pct) + '%' : '—'}</div>
        </div>
      </div>`;
  } catch (err) {
    document.getElementById('lc-body').innerHTML = `<div class="inline-err">Lifecycle: ${esc(err.message)}</div>`;
  }
}

// ── 4. Contagion Map ─────────────────────────────────────────────────────────
async function loadContagion() {
  if (!TICKER) return;
  try {
    const analyses = await sbFetch('narrative_analyses', {
      select: 'upstream_tickers,downstream_tickers,contagion_risk,macro_theme,causal_chain,chain_strength',
      ticker: `eq.${TICKER}`,
      order:  'created_at.desc',
      limit:  '1'
    }).catch(() => []);

    let upstream = [], downstream = [], contagionRisk = null, macroTheme = null, causalChain = [];
    if (analyses[0]) {
      const row = analyses[0];
      try { upstream    = JSON.parse(row.upstream_tickers   || '[]'); } catch { upstream   = []; }
      try { downstream  = JSON.parse(row.downstream_tickers || '[]'); } catch { downstream = []; }
      try { causalChain = JSON.parse(row.causal_chain       || '[]'); } catch { causalChain = []; }
      if (!Array.isArray(upstream))    upstream    = [];
      if (!Array.isArray(downstream))  downstream  = [];
      if (!Array.isArray(causalChain)) causalChain = [];
      contagionRisk = row.contagion_risk ?? null;
      macroTheme    = row.macro_theme    ?? null;
    }

    const scoreCls = contagionRisk == null ? 'ct-score-none'
      : contagionRisk >= 60 ? 'ct-score-high'
      : contagionRisk >= 30 ? 'ct-score-mid'
      : 'ct-score-low';

    // Upstream group
    const upHtml = upstream.length
      ? upstream.slice(0,4).map(t => `<div class="ct-chip upstream">${esc(t)}</div>`).join('')
      : `<div class="ct-empty">None identified</div>`;

    // Downstream group
    const downHtml = downstream.length
      ? downstream.slice(0,4).map(t => `<div class="ct-chip downstream">${esc(t)}</div>`).join('')
      : `<div class="ct-empty">None identified</div>`;

    // Causal chain strip
    const chainHtml = causalChain.length
      ? `<div class="ct-chain">
          <span class="ct-chain-label">Chain</span>
          ${causalChain.map((step, i) => `
            <span class="ct-chain-step">${esc(step)}</span>
            ${i < causalChain.length - 1 ? '<span class="ct-chain-arrow">→</span>' : ''}
          `).join('')}
        </div>` : '';

    document.getElementById('ct-body').innerHTML = `
      <div class="ct-top">
        <div class="ct-desc">Supply chain contagion risk</div>
        <div class="ct-meta">
          ${macroTheme ? `<span class="ct-theme">${esc(macroTheme.replace(/_/g,' '))}</span>` : ''}
          ${contagionRisk != null ? `<span class="ct-score ${scoreCls}">Risk ${Math.round(contagionRisk)}/100</span>` : ''}
        </div>
      </div>
      <div class="ct-flow">
        <div class="ct-group">
          <div class="ct-group-label">Upstream</div>
          ${upHtml}
        </div>
        <div class="ct-arrow">
          <div class="ct-arrow-line"></div>
          <div class="ct-arrow-label">feeds into</div>
        </div>
        <div class="ct-group" style="align-items:center;">
          <div class="ct-group-label" style="text-align:center;">This ticker</div>
          <div class="ct-chip focal">${esc(TICKER)}</div>
        </div>
        <div class="ct-arrow">
          <div class="ct-arrow-line"></div>
          <div class="ct-arrow-label">affects</div>
        </div>
        <div class="ct-group">
          <div class="ct-group-label">Downstream</div>
          ${downHtml}
        </div>
      </div>
      ${chainHtml}`;
  } catch (err) {
    document.getElementById('ct-body').innerHTML = `<div class="inline-err">Contagion: ${esc(err.message)}</div>`;
  }
}

// ── 5. Prerequisites ─────────────────────────────────────────────────────────
async function loadPrerequisites() {
  if (!TICKER) return;
  try {
    const analyses = await sbFetch('narrative_analyses', {
      select: 'prerequisites_json,prerequisites_met,prerequisites_total',
      ticker: `eq.${TICKER}`,
      order:  'created_at.desc',
      limit:  '1'
    }).catch(() => []);

    if (!analyses.length) {
      document.getElementById('pr-body').innerHTML = '<div class="no-data">No prerequisite data available.</div>';
      return;
    }

    const row   = analyses[0];
    const met   = row.prerequisites_met   ?? 0;
    const total = row.prerequisites_total ?? 0;

    let items = [];
    if (row.prerequisites_json) {
      try {
        const raw = row.prerequisites_json;
        items = typeof raw === 'string' ? JSON.parse(raw) : raw;
        if (!Array.isArray(items)) items = Object.values(items);
      } catch { items = []; }
    }

    if (!items.length && !total) {
      document.getElementById('pr-body').innerHTML = '<div class="no-data">No prerequisite data available.</div>';
      return;
    }

    // Show up to 4 boxes — pad with empty if fewer than 4
    const display = items.slice(0, 4);
    while (display.length < 4 && total > display.length) {
      display.push(null); // placeholder
    }

    const metCount   = items.length ? items.filter(p => {
      const s = String(p?.status || (p?.met === true ? 'MET' : 'PENDING')).toUpperCase();
      return s === 'MET';
    }).length : met;

    const boxesHtml = display.map(p => {
      if (!p) return `<div class="pr-box pr-box-pending"><span class="pr-status pr-pending">—</span><div class="pr-text" style="color:var(--text-tertiary);">Pending</div></div>`;
      const rawStatus = String(p.status || (p.met === true ? 'MET' : p.met === false ? 'NOT MET' : 'PENDING')).toUpperCase();
      const stCls  = rawStatus === 'MET' ? 'pr-met' : rawStatus === 'NOT MET' ? 'pr-not-met' : 'pr-pending';
      const label  = rawStatus === 'NOT MET' ? 'NOT MET' : rawStatus === 'MET' ? 'MET' : 'PENDING';
      return `<div class="pr-box">
        <span class="pr-status ${stCls}">${label}</span>
        <div class="pr-text">${esc(p.text || p.condition || p.description || '—')}</div>
      </div>`;
    }).join('');

    document.getElementById('pr-body').innerHTML = `
      <div class="pr-pad">
        <div class="pr-top">
          <div class="pr-desc">Conditions for narrative validation</div>
          <div class="pr-count"><strong>${metCount}</strong> / ${total || items.length} met</div>
        </div>
      </div>
      <div class="pr-boxes">${boxesHtml}</div>`;
  } catch (err) {
    document.getElementById('pr-body').innerHTML = `<div class="inline-err">Prerequisites: ${esc(err.message)}</div>`;
  }
}

// ── 6. What Happened Last Time — v_dash_historical_analogs ───────────────────
async function loadParallels() {
  if (!TICKER) return;
  try {
    const items = await sbFetch('v_dash_historical_analogs', {
      select: 'analog_ticker,analog_date,analog_move,recovery_days,similarity_score,match_basis',
      ticker: `eq.${TICKER}`,
      order:  'similarity_score.desc',
      limit:  '3'
    }).catch(() => []);

    if (!items.length) {
      document.getElementById('par-body').innerHTML = '<div class="par-item"><div class="no-data">No historical analogs found yet.</div></div>';
      return;
    }

    document.getElementById('par-body').innerHTML = items.map(p => {
      const move     = p.analog_move;
      const moveTxt  = move != null ? (move > 0 ? '+' : '') + move.toFixed(1) + '%' : '—';
      const moveCls  = move > 0 ? 'par-pct-pos' : move < 0 ? 'par-pct-neg' : '';
      const simPct   = p.similarity_score != null ? Math.round(p.similarity_score * 100) : null;

      return `<div class="par-item">
        <div class="par-top">
          <div class="par-left">
            <span class="par-ticker">${esc(p.analog_ticker || '—')}</span>
            <span class="par-date">${esc(p.analog_date || '—')}</span>
          </div>
          <div class="par-right">
            <span class="par-days">${p.recovery_days != null ? p.recovery_days + 'd recovery' : ''}</span>
            <span class="par-pct ${moveCls}">${moveTxt}</span>
          </div>
        </div>
        <div class="par-name">${esc(p.match_basis || '—')}</div>
        ${simPct != null ? `<div class="par-sim">
          <span class="par-sim-label">Similarity</span>
          <div class="par-sim-track"><div class="par-sim-fill" style="width:${simPct}%;"></div></div>
          <span class="par-sim-pct">${simPct}%</span>
        </div>` : ''}
      </div>`;
    }).join('');
  } catch (err) {
    document.getElementById('par-body').innerHTML = `<div class="par-item inline-err">Analogs: ${esc(err.message)}</div>`;
  }
}

// ── 7. Move Drivers — v_dash_move_drivers ────────────────────────────────────
async function loadMoveDrivers() {
  if (!TICKER) return;
  try {
    const items = await sbFetch('v_dash_move_drivers', {
      select: 'driver,impact_pct,driver_class',
      ticker: `eq.${TICKER}`,
      order:  'snapshot_date.desc',
      limit:  '6'
    }).catch(() => []);

    if (!items.length) {
      document.getElementById('drivers-body').innerHTML = '<div class="no-data">No driver data available.</div>';
      return;
    }

    // Deduplicate by driver name (keep latest)
    const seen = new Set();
    const unique = items.filter(d => { if (seen.has(d.driver)) return false; seen.add(d.driver); return true; });

    const maxAbs = Math.max(...unique.map(d => Math.abs(d.impact_pct || 0)), 1);

    document.getElementById('drivers-body').innerHTML = unique.map(d => {
      const pct     = d.impact_pct ?? 0;
      const barPct  = Math.round((Math.abs(pct) / maxAbs) * 100);
      const isPos   = pct >= 0;
      const barCls  = isPos ? 'driver-bar-pos' : 'driver-bar-neg';
      const clsTag  = d.driver_class
        ? `<span class="driver-class-tag">${esc(d.driver_class)}</span>` : '';
      return `<div class="driver-row">
        <div class="driver-left">
          <div class="driver-name">${esc(d.driver)}</div>
          ${clsTag}
        </div>
        <div class="driver-right">
          <div class="driver-bar-track">
            <div class="driver-bar ${barCls}" style="width:${barPct}%;"></div>
          </div>
          <div class="driver-impact ${isPos ? 'impact-pos' : 'impact-neg'}">${isPos ? '+' : ''}${pct}%</div>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    document.getElementById('drivers-body').innerHTML = `<div class="inline-err">Drivers: ${esc(err.message)}</div>`;
  }
}

  if (!TICKER) return;
  const heroData = await loadHero();

  await Promise.all([

    loadLifecycle(),
    loadContagion(),
    loadPrerequisites(),
    loadParallels(),
    loadMoveDrivers()
  ]);
