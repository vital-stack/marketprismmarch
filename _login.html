<title>Sign In — Market Prism AI</title>
<meta name="description" content="Sign in to Market Prism AI intelligence dashboard. Access AI-powered stock analysis and narrative signals.">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --mp-obsidian:#08090F;
  --mp-deep:#0A0E1A;
  --mp-surface:rgba(14,18,32,0.55);
  --mp-surface2:rgba(20,29,53,0.6);
  --mp-border:rgba(255,255,255,0.06);
  --mp-border-mid:rgba(255,255,255,0.10);
  --mp-text-primary:#F0F4FF;
  --mp-text-secondary:#8B97B8;
  --mp-text-tertiary:#4A5578;
  --mp-teal:#00DE94;
  --mp-blue:#00AEFF;
  --mp-red:#E05252;
  --font-display:'Instrument Serif','Georgia',serif;
  --font-body:'DM Sans','Helvetica Neue',sans-serif;
  --font-mono:'DM Mono','Fira Code',monospace;
}
html,body{
  height:100%;font-family:var(--font-body);
  background:var(--mp-obsidian);color:var(--mp-text-primary);
  overflow:hidden;
}
body{
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 60% 50% at 50% 30%, rgba(0,174,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 30% 70%, rgba(0,222,148,0.03) 0%, transparent 70%),
    var(--mp-obsidian);
}
/* Grid background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 70% 50% at 50% 50%, black, transparent);
  -webkit-mask-image:radial-gradient(ellipse 70% 50% at 50% 50%, black, transparent);
}
/* Login container */
.login-container{
  position:relative;z-index:1;width:100%;max-width:420px;padding:0 20px;
  animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}
/* Logo */
.login-logo{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:32px;
}
.login-logo span{ display:none; }
.login-logo-img{height:40px;width:auto;flex-shrink:0;}
.login-logo-img.logo-light{display:block;}
.login-logo-img.logo-dark{display:none;}
[data-theme="light"] .login-logo-img.logo-light{display:none;}
[data-theme="light"] .login-logo-img.logo-dark{display:block;}
/* Card */
.login-card{
  background:rgba(14,18,32,0.75);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--mp-border-mid);
  border-radius:20px;
  padding:36px 32px 32px;
  box-shadow:
    0 24px 80px rgba(0,0,0,0.4),
    0 0 1px rgba(255,255,255,0.05),
    inset 0 1px 0 rgba(255,255,255,0.03);
  transition:border-color 0.3s;
}
.login-card:hover{border-color:rgba(255,255,255,0.14);}
/* Tabs */
.auth-tabs{
  display:flex;gap:0;margin-bottom:28px;
  border-bottom:1px solid var(--mp-border);
}
.auth-tab{
  flex:1;padding:10px 0;border:none;background:none;cursor:pointer;
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--mp-text-tertiary);
  border-bottom:2px solid transparent;
  transition:color 0.2s,border-color 0.2s;
}
.auth-tab:hover{color:var(--mp-text-secondary);}
.auth-tab.active{
  color:var(--mp-text-primary);
  border-bottom-color:var(--mp-blue);
}
/* Form */
.auth-form{display:none;flex-direction:column;gap:18px;}
.auth-form.active{display:flex;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{
  font-family:var(--font-mono);font-size:10px;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  color:var(--mp-text-secondary);
}
.form-input{
  width:100%;padding:12px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--mp-border-mid);
  border-radius:10px;
  font-family:var(--font-body);font-size:14px;
  color:var(--mp-text-primary);
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
}
.form-input::placeholder{color:var(--mp-text-tertiary);}
.form-input:focus{
  border-color:rgba(0,174,255,0.4);
  box-shadow:0 0 0 3px rgba(0,174,255,0.08);
  background:rgba(255,255,255,0.04);
}
.form-input:hover:not(:focus){
  border-color:rgba(255,255,255,0.16);
}
/* Submit button */
.btn-submit{
  width:100%;padding:13px 20px;
  border:none;border-radius:10px;cursor:pointer;
  font-family:var(--font-mono);font-size:12px;font-weight:500;
  letter-spacing:0.06em;text-transform:uppercase;
  color:#fff;
  background:linear-gradient(135deg,rgba(0,174,255,0.85),rgba(0,174,255,0.65));
  box-shadow:0 4px 16px rgba(0,174,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.25s;
  margin-top:4px;
}
.btn-submit:hover{
  background:linear-gradient(135deg,rgba(0,174,255,0.95),rgba(0,174,255,0.75));
  box-shadow:0 8px 24px rgba(0,174,255,0.3),inset 0 1px 0 rgba(255,255,255,0.12);
  transform:translateY(-1px);
}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{
  opacity:0.4;cursor:not-allowed;transform:none;
  box-shadow:none;
}
.btn-submit.success{
  background:linear-gradient(135deg,rgba(0,222,148,0.85),rgba(0,222,148,0.65));
  box-shadow:0 4px 16px rgba(0,222,148,0.2);
}
/* Message */
.auth-message{
  padding:10px 14px;border-radius:8px;
  font-family:var(--font-mono);font-size:11px;
  letter-spacing:0.02em;line-height:1.5;
  display:none;
  animation:fadeIn 0.2s ease-out;
}
@keyframes fadeIn{0%{opacity:0;transform:translateY(-4px);}100%{opacity:1;transform:translateY(0);}}
.auth-message.error{
  display:block;
  background:rgba(224,82,82,0.08);
  border:1px solid rgba(224,82,82,0.2);
  color:#FF7070;
}
.auth-message.success{
  display:block;
  background:rgba(0,222,148,0.08);
  border:1px solid rgba(0,222,148,0.2);
  color:var(--mp-teal);
}
.auth-message.info{
  display:block;
  background:rgba(0,174,255,0.06);
  border:1px solid rgba(0,174,255,0.15);
  color:var(--mp-blue);
}
/* Footer */
.login-footer{
  text-align:center;margin-top:20px;
  font-family:var(--font-mono);font-size:9px;
  color:var(--mp-text-tertiary);letter-spacing:0.08em;
  text-transform:uppercase;
}
.login-footer a{
  color:var(--mp-text-secondary);text-decoration:none;
  transition:color 0.2s;
}
.login-footer a:hover{color:var(--mp-text-primary);}
/* Responsive */
@media(max-width:480px){
  .login-card{padding:28px 22px 24px;border-radius:16px;}
  .auth-tab{font-size:10px;padding:8px 0;}
}
/* Spinner */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin 0.6s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="login-container">
  <!-- Logo -->
  <div class="login-logo">
    <img class="login-logo-img logo-light" src="/assets/Market-Prism-Logo-Light.png" alt="Market Prism">
    <img class="login-logo-img logo-dark" src="/assets/Market-Prism-Logo-Dark.png" alt="Market Prism">
  </div>

  <!-- Card -->
  <div class="login-card">
    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('signin')">Sign In</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
      <button class="auth-tab" onclick="switchAuthTab('reset')">Reset Password</button>
    </div>

    <!-- Message area -->
    <div class="auth-message" id="auth-message"></div>

    <!-- Sign In Form -->
    <form class="auth-form active" id="form-signin" onsubmit="handleSignIn(event)">
      <div class="form-group">
        <label class="form-label" for="signin-email">Email</label>
        <input class="form-input" id="signin-email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="signin-password">Password</label>
        <input class="form-input" id="signin-password" type="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button class="btn-submit" type="submit" id="btn-signin">Sign In</button>
    </form>

    <!-- Register Form -->
    <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label" for="register-email">Email</label>
        <input class="form-input" id="register-email" type="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="register-password">Password</label>
        <input class="form-input" id="register-password" type="password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="register-confirm">Confirm Password</label>
        <input class="form-input" id="register-confirm" type="password" placeholder="Repeat password" required minlength="6" autocomplete="new-password">
      </div>
      <button class="btn-submit" type="submit" id="btn-register">Create Account</button>
    </form>

    <!-- Reset Password Form -->
    <form class="auth-form" id="form-reset" onsubmit="handleReset(event)">
      <div class="form-group">
        <label class="form-label" for="reset-email">Email</label>
        <input class="form-input" id="reset-email" type="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button class="btn-submit" type="submit" id="btn-reset">Send Reset Link</button>
    </form>
  </div>

  <div class="login-footer">
    Market Prism &middot; Polymathic Intelligence &middot; <a href="/">Home</a><br>
    <a href="/terms">Terms of Service</a> &middot; <a href="/privacy">Privacy Policy</a>
  </div>
</div>

<!--
  This page deliberately does NOT load the supabase-js CDN. Every other page
  in the codebase talks to Supabase via direct REST calls (see
  SUPABASE_INTEGRATION_REPORT.md → "All pages use direct Supabase REST calls"),
  so the login page does the same to avoid an unnecessary third-party
  dependency that can fail (jsDelivr outage, content blockers, etc).
-->
<!-- Env vars injected by server -->
<script id="__env_script">window.__login_env = { SUPABASE_URL: '', SUPABASE_ANON: '' };</script>
<script>
(function(){
  // ── Hardcoded fallback ─────────────────────────────────────────────────
  // If the SUPABASE_URL env var on Vercel was cleared or edited, the page
  // would otherwise have no way to talk to Supabase. The project URL is also
  // referenced in _template.html (SCORER_EDGE_URL), so we keep them in sync.
  var FALLBACK_SUPABASE_URL = 'https://kugfvlagaetiqtdwdfmk.supabase.co';

  // ── DOM helpers ────────────────────────────────────────────────────────
  function showMsg(type, text){
    var el = document.getElementById('auth-message');
    if(!el) return;
    el.className = 'auth-message ' + type;
    el.textContent = text;
  }
  function clearMsg(){
    var el = document.getElementById('auth-message');
    if(!el) return;
    el.className = 'auth-message';
    el.textContent = '';
  }
  function setLoading(btnId, loading){
    var btn = document.getElementById(btnId);
    if(!btn) return;
    btn.disabled = loading;
    if(loading){
      btn.dataset.origText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>Please wait…';
    } else {
      btn.textContent = btn.dataset.origText || 'Submit';
    }
  }

  // ── Network-error classification ───────────────────────────────────────
  // A failed fetch() surfaces as a TypeError. Browsers disagree on the
  // message: Safari/iOS says "Load failed", Chrome says "Failed to fetch",
  // Firefox says "NetworkError when attempting to fetch resource".
  function isNetworkError(err){
    if(!err) return false;
    if(err.name === 'TypeError') return true;
    var msg = String(err.message || err).toLowerCase();
    return msg.indexOf('load failed') !== -1
        || msg.indexOf('failed to fetch') !== -1
        || msg.indexOf('networkerror') !== -1
        || msg.indexOf('network request failed') !== -1;
  }
  function networkHelpMessage(){
    return 'Network error reaching the authentication service. '
         + 'If you use a content blocker (1Blocker, AdGuard, Brave Shields, '
         + 'DuckDuckGo Privacy, etc.), please disable it for marketprism.co '
         + 'and try again.';
  }

  // ── Resolve Supabase config ────────────────────────────────────────────
  var env = window.__login_env || {};
  var SUPABASE_URL  = (env.SUPABASE_URL  || '').trim();
  var SUPABASE_ANON = (env.SUPABASE_ANON || '').trim();

  // Force https://, strip trailing slash, and fall back if empty.
  if(SUPABASE_URL && !/^https?:\/\//i.test(SUPABASE_URL)){
    SUPABASE_URL = 'https://' + SUPABASE_URL;
  }
  SUPABASE_URL = SUPABASE_URL.replace(/\/+$/, '') || FALLBACK_SUPABASE_URL;

  if(!SUPABASE_ANON){
    showMsg('error','Authentication is not configured. Please contact support.');
    return;
  }

  // Storage key in the exact format supabase-js uses, so the dashboard's
  // SUPA.auth.getSession() picks up the session we write here.
  var PROJECT_REF = '';
  try { PROJECT_REF = new URL(SUPABASE_URL).hostname.split('.')[0]; }
  catch(e) { PROJECT_REF = 'kugfvlagaetiqtdwdfmk'; }
  var STORAGE_KEY = 'sb-' + PROJECT_REF + '-auth-token';

  // ── Session persistence ────────────────────────────────────────────────
  // supabase-js v2's localStorage shape. The dashboard reads `access_token`
  // and `expires_at` directly (see _daily.html and _heatmap.html).
  function persistSession(payload){
    var nowSec = Math.floor(Date.now() / 1000);
    var expiresIn = Number(payload.expires_in) || 3600;
    var expiresAt = Number(payload.expires_at) || (nowSec + expiresIn);
    var session = {
      access_token: payload.access_token,
      token_type: payload.token_type || 'bearer',
      expires_in: expiresIn,
      expires_at: expiresAt,
      refresh_token: payload.refresh_token || '',
      user: payload.user || null,
      provider_token: null,
      provider_refresh_token: null,
    };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(session)); }
    catch(e) { console.warn('[login] could not persist session:', e); }
    // Legacy paywall marker used by mp-core / older pages.
    try { localStorage.setItem('mp_auth', JSON.stringify({t: Date.now()})); }
    catch(e) {}
  }
  function readStoredSession(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      var parsed = JSON.parse(raw);
      if(parsed && parsed.access_token && parsed.expires_at && (parsed.expires_at * 1000) > Date.now()){
        return parsed;
      }
    } catch(e) {}
    return null;
  }

  // Already signed in? Skip straight to the dashboard.
  if(readStoredSession()){
    window.location.href = '/dashboard';
    return;
  }

  // ── Direct REST helpers ────────────────────────────────────────────────
  // Matches the pattern used by every other page in the codebase
  // (see SUPABASE_INTEGRATION_REPORT.md). No SDK, no CDN dependency.
  async function supabaseAuth(path, body){
    var resp;
    try {
      resp = await fetch(SUPABASE_URL + '/auth/v1/' + path, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON,
        },
        body: JSON.stringify(body),
      });
    } catch(netErr){
      // Re-throw with a recognizable name so the caller can decide whether
      // to fall back to the server-side proxy.
      var e = new Error(netErr.message || 'Load failed');
      e.name = 'TypeError';
      throw e;
    }
    var text = await resp.text();
    var data = {};
    try { data = text ? JSON.parse(text) : {}; }
    catch(_) { throw new Error('Unexpected response from auth server'); }
    if(!resp.ok){
      var msg = data.error_description || data.msg || data.error
             || ('Auth request failed (' + resp.status + ')');
      var err = new Error(msg);
      err.status = resp.status;
      throw err;
    }
    return data;
  }

  // Server-side proxy fallback: when *.supabase.co is unreachable from the
  // browser (content blocker, Lockdown Mode, restrictive network) we route
  // the request through our own origin via /api/auth-login.
  async function proxySignIn(email, password){
    var resp = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password }),
      credentials: 'same-origin',
    });
    var data;
    try { data = await resp.json(); }
    catch(e){ throw new Error('Unexpected response from server'); }
    if(!resp.ok){
      var err = new Error((data && data.error) || 'Sign in failed');
      err.status = resp.status;
      throw err;
    }
    if(!data.access_token){
      throw new Error('Sign in succeeded but no session was returned');
    }
    return data;
  }

  // ── Tab switching ──────────────────────────────────────────────────────
  window.switchAuthTab = function(tab){
    ['signin','register','reset'].forEach(function(t){
      var form = document.getElementById('form-'+t);
      var btn = document.querySelector('.auth-tab[onclick*="'+t+'"]');
      if(form) form.classList.toggle('active', t===tab);
      if(btn)  btn.classList.toggle('active', t===tab);
    });
    clearMsg();
  };

  var hash = window.location.hash.replace('#','');
  if(['signin','register','reset'].indexOf(hash) !== -1){
    switchAuthTab(hash);
  }

  var urlParams = new URLSearchParams(window.location.search);
  var prefillEmail = urlParams.get('email');
  if(prefillEmail){
    var regEmail = document.getElementById('register-email');
    if(regEmail) regEmail.value = prefillEmail;
    var signinEmail = document.getElementById('signin-email');
    if(signinEmail) signinEmail.value = prefillEmail;
  }

  function finishSignedIn(btnId){
    showMsg('success','Signed in successfully. Redirecting…');
    var btn = document.getElementById(btnId);
    if(btn) btn.classList.add('success');
    setTimeout(function(){ window.location.href = '/dashboard'; }, 600);
  }

  // ── Sign In ────────────────────────────────────────────────────────────
  window.handleSignIn = async function(e){
    e.preventDefault();
    clearMsg();
    var email = document.getElementById('signin-email').value.trim();
    var password = document.getElementById('signin-password').value;
    if(!email || !password){ showMsg('error','Please fill in all fields.'); return; }

    setLoading('btn-signin', true);

    try {
      var data = await supabaseAuth('token?grant_type=password', { email: email, password: password });
      persistSession(data);
      finishSignedIn('btn-signin');
      return;
    } catch(err){
      console.warn('[login] direct sign-in failed:', err);

      // Network failure → try the server-side proxy.
      if(isNetworkError(err)){
        showMsg('info','Network blocked the auth server. Retrying via secure relay…');
        try {
          var proxyData = await proxySignIn(email, password);
          persistSession(proxyData);
          finishSignedIn('btn-signin');
          return;
        } catch(proxyErr){
          console.warn('[login] proxy sign-in failed:', proxyErr);
          showMsg('error', isNetworkError(proxyErr)
            ? networkHelpMessage()
            : (proxyErr.message || 'Sign in failed. Please try again.'));
          setLoading('btn-signin', false);
          return;
        }
      }

      // Real auth error (bad credentials, unverified email, etc.) — show it.
      showMsg('error', err.message || 'Sign in failed. Check your credentials.');
      setLoading('btn-signin', false);
    }
  };

  // ── Register ───────────────────────────────────────────────────────────
  window.handleRegister = async function(e){
    e.preventDefault();
    clearMsg();
    var email = document.getElementById('register-email').value.trim();
    var password = document.getElementById('register-password').value;
    var confirmPw = document.getElementById('register-confirm').value;

    if(!email || !password || !confirmPw){ showMsg('error','Please fill in all fields.'); return; }
    if(password !== confirmPw){ showMsg('error','Passwords do not match.'); return; }
    if(password.length < 6){ showMsg('error','Password must be at least 6 characters.'); return; }

    setLoading('btn-register', true);
    try {
      var signupData = await supabaseAuth('signup', {
        email: email,
        password: password,
        data: {},
      });

      // Apply pending beta token if user came from a landing page.
      var pendingBeta = sessionStorage.getItem('mp-pending-beta');
      if(pendingBeta === 'stockpsycho'){
        var expires = new Date(); expires.setDate(expires.getDate() + 3);
        localStorage.setItem('mp-beta-access', 'true');
        localStorage.setItem('mp-beta-tier', 'pro');
        localStorage.setItem('mp-beta-expires', expires.toISOString());
        sessionStorage.removeItem('mp-pending-beta');
      }

      // Supabase /auth/v1/signup returns a session directly when email
      // confirmation is disabled (our config). Otherwise we have to sign in
      // separately to get tokens.
      if(signupData && signupData.access_token){
        persistSession(signupData);
      } else {
        try {
          var loginData = await supabaseAuth('token?grant_type=password', { email: email, password: password });
          persistSession(loginData);
        } catch(loginErr){
          showMsg('info','Account created! Please sign in.');
          setLoading('btn-register', false);
          return;
        }
      }

      showMsg('success','Account created! Redirecting…');
      setTimeout(function(){ window.location.href = '/dashboard'; }, 600);
    } catch(err){
      console.warn('[login] register failed:', err);
      showMsg('error', isNetworkError(err) ? networkHelpMessage() : (err.message || 'Registration failed.'));
      setLoading('btn-register', false);
    }
  };

  // ── Reset Password ─────────────────────────────────────────────────────
  window.handleReset = async function(e){
    e.preventDefault();
    clearMsg();
    var email = document.getElementById('reset-email').value.trim();
    if(!email){ showMsg('error','Please enter your email.'); return; }

    setLoading('btn-reset', true);
    try {
      await supabaseAuth('recover', {
        email: email,
        // Send the user back to /login after they click the reset link.
        // (Supabase appends a #access_token=... fragment.)
      });
      showMsg('success','Password reset link sent! Check your email inbox.');
    } catch(err){
      console.warn('[login] reset failed:', err);
      showMsg('error', isNetworkError(err) ? networkHelpMessage() : (err.message || 'Failed to send reset email.'));
    } finally {
      setLoading('btn-reset', false);
    }
  };

})();
</script>
</body>
</html>
