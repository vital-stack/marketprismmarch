name: Generate Market Prism Blog Post

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7am ET (12:00 UTC) Monday–Friday
  workflow_dispatch:           # manual trigger from GitHub Actions UI
    inputs:
      ticker:
        description: 'Specific ticker (leave blank to auto-pick)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (generate but do not insert)'
        type: boolean
        required: false
        default: false

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic supabase yfinance python-dotenv

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="--ticker ${{ github.event.inputs.ticker }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python generate_mp_blog.py $ARGS
